<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pa1oLAB v2</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.nav-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  cursor: pointer;
}
.nav-btn.active { background:#4f46e5; color:white; }
.copy-success { background:#22c55e !important; color:white !important; }
</style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">

<div class="max-w-6xl mx-auto p-8">

<h1 class="text-2xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<!-- NAV -->
<div class="flex gap-2 mb-6">
  <button data-page="po" class="nav-btn active">Purchase</button>
  <button data-page="align" class="nav-btn">Alignment</button>
  <button data-page="eng" class="nav-btn">Engineering</button>
  <button data-page="mask" class="nav-btn">Masking</button>
</div>

<!-- CARD -->
<div class="bg-white rounded-xl p-6 shadow">

<!-- PURCHASE -->
<div id="po" class="view">
  <h2 class="font-semibold mb-2">💰 Purchase</h2>
  <p class="text-sm text-slate-500">Coming soon</p>
</div>

<!-- ALIGN -->
<div id="align" class="view hidden">
  <h2 class="font-semibold mb-2">🧬 Alignment</h2>
  <textarea id="seq" class="w-full p-2 border rounded font-mono"></textarea>
  <div id="output" class="mt-3 font-mono text-sm"></div>
</div>

<!-- ENG -->
<div id="eng" class="view hidden">
  <h2 class="font-semibold">🧪 Engineering</h2>
  <p class="text-sm text-slate-500">Coming soon</p>
</div>

<!-- MASK -->
<div id="mask" class="view hidden">

<h2 class="font-semibold mb-4 text-center">🎭 Masking</h2>

<input id="maskInput"
  class="w-full max-w-xl mx-auto block p-2 border rounded font-mono text-center mb-4"
  placeholder="Paste sequence">

<div class="flex justify-center gap-2 mb-2">
  <button id="btnManual" class="nav-btn active">Manual</button>
  <button id="btnSlide" class="nav-btn">Sliding</button>
</div>

<p id="modeLabel" class="text-center text-xs mb-4">Mode: Manual</p>

<div class="flex justify-center gap-3 mb-4">
  <input id="winVal" type="number" value="5" class="w-16 border rounded text-center">
  <input id="stepVal" type="number" value="1" class="w-16 border rounded text-center">
  <button id="genBtn" class="bg-indigo-600 text-white px-3 rounded">Generate</button>
</div>

<div id="grid" class="flex flex-wrap gap-2 justify-center mb-4"></div>

<div class="bg-slate-100 p-3 rounded">
  <div class="flex justify-between mb-2">
    <span class="text-xs">Library</span>
    <button id="copyAllBtn" class="text-xs bg-indigo-600 text-white px-2 rounded">Copy All</button>
  </div>
  <div id="libList" class="space-y-2 max-h-48 overflow-y-auto"></div>
</div>

</div>

</div>
</div>

<script>

/* NAV FIX (ไม่ใช้ event.target แล้ว) */
const navBtns = document.querySelectorAll("[data-page]")
navBtns.forEach(btn=>{
  btn.onclick = ()=>{
    navBtns.forEach(b=>b.classList.remove("active"))
    btn.classList.add("active")

    document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"))
    document.getElementById(btn.dataset.page).classList.remove("hidden")
  }
})

/* ALIGN */
document.getElementById("seq").addEventListener("input", e=>{
  const s = e.target.value
  let html=""
  for(let i=0;i<s.length;i++){
    html += `<span title="pos ${i+1}" class="inline-block w-4 text-center hover:bg-indigo-500 hover:text-white">${s[i]}</span>`
  }
  document.getElementById("output").innerHTML = html
})

/* MASK ENGINE (stable version) */
let sequence=""
let mode="manual"
let manualMask=[]
let lib=new Set()

const maskInput=document.getElementById("maskInput")
const grid=document.getElementById("grid")
const libList=document.getElementById("libList")

maskInput.oninput = e=>{
  sequence=e.target.value.toUpperCase()
  renderGrid()
}

document.getElementById("btnManual").onclick=()=>{
  mode="manual"
  setModeUI()
}
document.getElementById("btnSlide").onclick=()=>{
  mode="slide"
  setModeUI()
}

function setModeUI(){
  document.getElementById("modeLabel").innerText="Mode: "+mode
  document.getElementById("btnManual").classList.toggle("active",mode==="manual")
  document.getElementById("btnSlide").classList.toggle("active",mode==="slide")
}

function renderGrid(){
  grid.innerHTML=""
  manualMask=[]

  sequence.split("").forEach((aa,i)=>{
    const box=document.createElement("div")
    box.className="w-10 h-12 border rounded text-center cursor-pointer"

    box.innerHTML=`<div>${aa}</div><div style="font-size:10px">${i+1}</div>`

    box.onclick=()=>{
      if(mode!=="manual") return

      if(manualMask.includes(i)){
        manualMask=manualMask.filter(x=>x!==i)
        box.style.background=""
      }else{
        manualMask.push(i)
        box.style.background="#f87171"
      }
    }

    grid.appendChild(box)
  })
}

document.getElementById("genBtn").onclick=()=>{

  /* manual */
  if(manualMask.length){
    let arr=sequence.split("")
    manualMask.forEach(i=>arr[i]="_")
    lib.add(arr.join(""))
  }

  /* sliding */
  let w=parseInt(document.getElementById("winVal").value)
  let s=parseInt(document.getElementById("stepVal").value)

  for(let i=0;i<=sequence.length-w;i+=s){
    let arr=sequence.split("")
    for(let j=0;j<w;j++) arr[i+j]="_"
    lib.add(arr.join(""))
  }

  renderList()
}

function renderList(){
  libList.innerHTML=""
  lib.forEach(seq=>{
    const row=document.createElement("div")
    row.className="flex justify-between bg-white p-2 rounded"

    const span=document.createElement("span")
    span.className="font-mono text-xs"
    span.innerText=seq

    const btn=document.createElement("button")
    btn.className="text-xs bg-slate-200 px-2 rounded"
    btn.innerText="Copy"
    btn.onclick=()=>copy(btn,seq)

    row.appendChild(span)
    row.appendChild(btn)
    libList.appendChild(row)
  })
}

document.getElementById("copyAllBtn").onclick=()=>{
  copy(document.getElementById("copyAllBtn"),Array.from(lib).join("\n"))
}

function copy(btn,text){
  navigator.clipboard.writeText(text)
  btn.classList.add("copy-success")
  btn.innerText="✓"
  setTimeout(()=>{
    btn.classList.remove("copy-success")
    btn.innerText="Copy"
  },800)
}

</script>

</body>
</html>
