<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pa1oLAB v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-800 p-6 max-w-6xl mx-auto">

  <h1 class="text-2xl font-bold mb-4">🧬 Pa1oLAB v2</h1>

  <!-- NAV -->
  <div class="flex gap-2 mb-6">
    <button onclick="show('po')" class="btn">Purchase</button>
    <button onclick="show('align')" class="btn">Alignment</button>
    <button onclick="show('eng')" class="btn">Engineering</button>
    <button onclick="show('mask')" class="btn">Masking</button>
  </div>

  <!-- PURCHASE -->
  <div id="po" class="view">
    <h2 class="text-lg font-bold">💰 Purchase Order</h2>
    <p class="text-slate-500">(Future: Google Sheet integration)</p>
  </div>

  <!-- ALIGNMENT -->
  <div id="align" class="view hidden">
    <h2 class="text-lg font-bold mb-2">🧬 Alignment</h2>
    <textarea id="seq" class="w-full border p-2 font-mono"></textarea>

    <div id="output" class="mt-4 font-mono text-sm"></div>
  </div>

  <!-- ENGINEERING -->
  <div id="eng" class="view hidden">
    <h2 class="text-lg font-bold">🧬 Engineering</h2>
    <p class="text-slate-500">Mutation + Codon (coming soon)</p>
  </div>

  <!-- MASKING -->
  <div id="mask" class="view hidden">
    <h2 class="text-lg font-bold mb-2">🎭 Masking</h2>

    <input id="maskInput" class="w-full border p-2 font-mono mb-3" placeholder="Paste protein sequence">

    <div id="grid" class="flex flex-wrap gap-1"></div>

    <div class="mt-4 bg-slate-100 p-3 rounded">
      <p id="maskPos"></p>
      <p id="maskSeq" class="font-mono"></p>
    </div>

    <button onclick="copySeq()" class="mt-2 bg-indigo-600 text-white px-4 py-2 rounded">
      Copy
    </button>
  </div>

<script>
function show(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'))
  document.getElementById(id).classList.remove('hidden')
}

/* ALIGNMENT */
document.getElementById("seq").addEventListener("input", e=>{
  const s = e.target.value
  let html = ""
  for(let i=0;i<s.length;i++){
    html += `<span title="Position ${i+1}" class="inline-block w-4 text-center hover:bg-yellow-300">${s[i]}</span>`
  }
  document.getElementById("output").innerHTML = html
})

/* MASKING */
let masked = []

document.getElementById("maskInput").addEventListener("input", e=>{
  const seq = e.target.value.toUpperCase()
  const grid = document.getElementById("grid")
  grid.innerHTML = ""

  seq.split("").forEach((aa,i)=>{
    const box = document.createElement("div")
    box.className = "w-8 h-10 border flex flex-col items-center text-xs cursor-pointer"
    box.innerHTML = `<b>${aa}</b><span>${i+1}</span>`

    box.onclick = ()=>{
      if(masked.includes(i)) masked = masked.filter(x=>x!==i)
      else masked.push(i)
      update(seq)
    }

    grid.appendChild(box)
  })
})

function update(seq){
  let out = ""
  for(let i=0;i<seq.length;i++){
    out += masked.includes(i) ? "_" : seq[i]
  }
  document.getElementById("maskSeq").innerText = out
  document.getElementById("maskPos").innerText = "Masked: " + masked.map(i=>i+1).join(", ")
}

function copySeq(){
  navigator.clipboard.writeText(document.getElementById("maskSeq").innerText)
}
</script>

<style>
.btn {
  background:white;
  border:1px solid #ddd;
  padding:6px 12px;
  border-radius:6px;
}
.btn:hover{
  background:#eee;
}
</style>

</body>
</html>
