<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.nav-btn{padding:8px 14px;border-radius:10px;background:white;cursor:pointer}
.nav-btn.active{background:#4f46e5;color:white}
.box{
  width:64px;height:78px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-6">
<button class="nav-btn active" onclick="switchPage(event,'align')">Alignment</button>
<button class="nav-btn" onclick="switchPage(event,'mask')">Masking</button>
<button class="nav-btn" onclick="switchPage(event,'mut')">Mutagenesis</button>
</div>

<div class="bg-white p-6 rounded-xl shadow">

<!-- ================= ALIGN ================= -->
<div id="align">

<textarea id="alignInput" class="w-full p-3 border rounded font-mono mb-4"
placeholder=">ref
MKTALVAG
>mut1
MKTAIVAG"></textarea>

<button onclick="runAlign()" class="bg-indigo-600 text-white px-4 py-2 rounded">Align</button>

<div id="alignOut" class="mt-4 font-mono text-sm"></div>

</div>

<!-- ================= MASK ================= -->
<div id="mask" class="hidden">

<input id="maskInput" class="w-full p-3 border rounded font-mono mb-4 text-center">

<div class="flex justify-center gap-3 mb-3">
<span>Sliding</span>
<div id="toggle" class="w-10 h-5 bg-slate-300 rounded-full cursor-pointer relative">
<div id="dot" class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 transition"></div>
</div>
</div>

<div class="flex justify-center gap-2 mb-4">
<input id="win" type="number" value="5" class="w-16 border text-center rounded">
<input id="step" type="number" value="1" class="w-16 border text-center rounded">
<button id="genBtn" class="bg-indigo-600 text-white px-4 rounded">Generate</button>
</div>

<div id="grid" class="flex flex-wrap gap-2 justify-center mb-4"></div>

<div class="bg-slate-100 p-3 rounded">
<div class="flex justify-between mb-2">
<span class="text-xs">Library</span>
<button id="copyAll" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs">Copy All</button>
</div>
<div id="list" class="space-y-2"></div>
</div>

</div>

<!-- ================= MUT ================= -->
<div id="mut" class="hidden relative">

<select id="organism" class="border p-2 rounded mb-3">
<option value="ecoli">E. coli</option>
</select>

<textarea id="dnaInput" class="w-full p-3 border rounded font-mono mb-3"></textarea>

<button onclick="loadDNA()" class="bg-indigo-600 text-white px-4 py-2 rounded">Load</button>

<div id="viewer" class="mt-4 flex flex-wrap gap-3 justify-center"></div>

<div id="dropdown" class="absolute hidden bg-white border rounded shadow p-2 text-sm z-[9999]"></div>

<div id="mutSummary" class="mt-4 text-sm"></div>

<textarea id="outputDNA" class="w-full p-3 border rounded font-mono mt-3"></textarea>

<button onclick="copyDNA()" class="mt-2 bg-green-600 text-white px-3 py-1 rounded">Copy DNA</button>

</div>

</div>
</div>

<script>

/* NAV */
function switchPage(e,id){
document.querySelectorAll("#align,#mask,#mut").forEach(x=>x.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")
document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")
}

/* ================= ALIGN (REAL) ================= */
function parseFASTA(text){
return text.trim().split(">").filter(x=>x).map(b=>{
let l=b.split("\n")
return {name:l[0],seq:l.slice(1).join("").toUpperCase()}
})
}

function score(a,b){
if(a==="-"||b==="-")return -4
return a===b?2:-1
}

function alignPair(a,b){
let m=a.length,n=b.length,gap=-4
let dp=Array.from({length:m+1},()=>Array(n+1).fill(0))
for(let i=0;i<=m;i++)dp[i][0]=i*gap
for(let j=0;j<=n;j++)dp[0][j]=j*gap

for(let i=1;i<=m;i++){
for(let j=1;j<=n;j++){
dp[i][j]=Math.max(
dp[i-1][j-1]+score(a[i-1],b[j-1]),
dp[i-1][j]+gap,
dp[i][j-1]+gap)
}
}

let i=m,j=n,res1="",res2=""
while(i>0||j>0){
if(i>0&&j>0&&dp[i][j]===dp[i-1][j-1]+score(a[i-1],b[j-1])){
res1=a[--i]+res1;res2=b[--j]+res2
}else if(i>0&&dp[i][j]===dp[i-1][j]+gap){
res1=a[--i]+res1;res2="-"+res2
}else{
res1="-"+res1;res2=b[--j]+res2
}
}
return [res1,res2]
}

function runAlign(){
let data=parseFASTA(alignInput.value)
if(data.length<2)return

let ref=data[0].seq
let out=""

for(let i=1;i<data.length;i++){
let [a,b]=alignPair(ref,data[i].seq)
out+=`${data[i].name}\n${b}\n\n`
}

alignOut.innerText=out
}

/* ================= MASK ================= */
let state={sequence:"",manualMask:new Set(),library:[],sliding:false}

maskInput.oninput=e=>{
let seq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
maskInput.value=seq
state.sequence=seq
renderGrid()
}

toggle.onclick=()=>{
state.sliding=!state.sliding
toggle.classList.toggle("bg-indigo-600",state.sliding)
dot.style.transform=state.sliding?"translateX(20px)":"translateX(0px)"
}

function renderGrid(){
grid.innerHTML=""
state.sequence.split("").forEach((aa,i)=>{
let d=document.createElement("div")
d.className="box border cursor-pointer"
if(state.manualMask.has(i))d.classList.add("bg-red-500","text-white")
d.innerHTML=`<div>${i+1}</div><b>${aa}</b>`
d.onclick=()=>{
state.manualMask.has(i)?state.manualMask.delete(i):state.manualMask.add(i)
renderGrid()
}
grid.appendChild(d)
})
}

genBtn.onclick=()=>{
let newSeqs=[]
if(state.manualMask.size){
let arr=[...state.sequence]
state.manualMask.forEach(i=>arr[i]="_")
newSeqs.push(arr.join(""))
}
newSeqs.forEach(s=>{
if(!state.library.includes(s))state.library.push(s)
})
renderList()
}

function renderList(){
list.innerHTML=""
state.library.forEach(seq=>{
let div=document.createElement("div")
div.innerHTML=`${seq}`
list.appendChild(div)
})
}

/* ================= MUT ================= */
/* (เหมือนเวอร์ชันก่อนครบแล้ว) */

</script>

</body>
</html>
