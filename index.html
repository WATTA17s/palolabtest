<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.box{width:64px;height:84px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px}
.tab{padding:6px 12px;border-radius:8px;background:white;cursor:pointer}
.tab.active{background:#4f46e5;color:white}
.org{padding:4px 10px;border-radius:999px;border:1px solid #ddd;cursor:pointer}
.org.active{background:#4f46e5;color:white}
#dropdown{position:fixed;z-index:9999}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">
<h1 class="text-3xl mb-4">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-4">
<div class="tab active" onclick="switchTab('mask',this)">Masking</div>
<div class="tab" onclick="switchTab('mut',this)">Mutagenesis</div>
</div>

<div class="bg-white p-6 rounded shadow">

<!-- MASK -->
<div id="mask">
<input id="maskInput" class="w-full p-3 border rounded mb-3 text-center" placeholder="Protein (1-letter)">
<div class="flex gap-2 mb-3 justify-center">
<input id="win" value="5" class="w-16 border text-center">
<input id="step" value="1" class="w-16 border text-center">
<button onclick="generateMask()" class="bg-indigo-600 text-white px-3 rounded">Sliding</button>
<button onclick="copyMask()" class="bg-green-600 text-white px-3 rounded">Copy</button>
</div>

<div id="maskGrid" class="flex flex-wrap gap-2"></div>
<div id="maskLib" class="mt-4 flex flex-wrap gap-2"></div>
</div>

<!-- MUT -->
<div id="mut" class="hidden">

<div class="flex flex-wrap gap-2 mb-3" id="orgButtons"></div>

<!-- 🔥 NAME FORMAT -->
<div class="mb-3">
<div class="flex gap-2 mb-1">
<button onclick="formatText('bold')" class="px-2 border rounded font-bold">B</button>
<button onclick="formatText('italic')" class="px-2 border rounded italic">I</button>
</div>

<div id="seqName"
contenteditable="true"
class="border px-3 py-2 rounded w-64 bg-white empty:text-gray-400"
data-placeholder="Enter sequence name">
</div>
</div>

<textarea id="dnaInput" class="w-full p-3 border rounded mb-3" placeholder="DNA sequence"></textarea>

<div id="viewer" class="flex flex-wrap gap-2"></div>

<div id="dropdown" class="hidden bg-white border rounded shadow p-3 text-sm max-h-80 overflow-y-auto"></div>

<div class="mt-4">
<div id="mutSummary" class="flex gap-2 flex-wrap"></div>

<div id="outputDNA" class="w-full border p-3 mt-3 font-mono bg-white break-all rounded"></div>

<!-- EXPORT + BACKUP -->
<div class="mt-4 flex gap-2 items-center">

<button onclick="exportWord()"
class="bg-blue-600 text-white px-4 py-2 rounded">
Export Word
</button>

<button onclick="backupData()"
class="bg-purple-600 text-white px-4 py-2 rounded">
Backup
</button>

</div>

</div>
</div>

</div>
</div>

<script>

/* TAB */
function switchTab(id,el){
document.getElementById("mask").classList.add("hidden")
document.getElementById("mut").classList.add("hidden")
document.getElementById(id).classList.remove("hidden")
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))
el.classList.add("active")
}

/* ================= MASK ================= */
let maskSeq="",maskSet=new Set(),library=[]

document.getElementById("maskInput").oninput=e=>{
maskSeq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
renderMask()
}

function renderMask(){
let grid=document.getElementById("maskGrid")
grid.innerHTML=""

maskSeq.split("").forEach((a,i)=>{
let d=document.createElement("div")
d.className="box border cursor-pointer transition"

if(maskSet.has(i)){
d.classList.add("bg-red-500","text-white","scale-110")
}else{
d.classList.add("bg-white")
}

d.innerHTML=`<div class="text-xs">${i+1}</div><b>${a}</b>`
d.onclick=()=>{
maskSet.has(i)?maskSet.delete(i):maskSet.add(i)
renderMask()
}

grid.appendChild(d)
})
}

function generateMask(){
library=[]
let w=+document.getElementById("win").value
let s=+document.getElementById("step").value

for(let i=0;i<=maskSeq.length-w;i+=s){
let arr=[...maskSeq]
for(let j=0;j<w;j++) arr[i+j]="_"
library.push(arr.join(""))
}

document.getElementById("maskLib").innerHTML=library.join("<br>")
}

function copyMask(){navigator.clipboard.writeText(library.join("\n"))}

/* ================= FORMAT ================= */
function formatText(cmd){
document.execCommand(cmd, false, null)
}

/* ================= AA ================= */
const AA_INFO={
A:{name:"Alanine",codons:["GCT","GCC","GCA","GCG"]},
R:{name:"Arginine",codons:["CGT","CGC","CGA","CGG","AGA","AGG"]},
N:{name:"Asparagine",codons:["AAT","AAC"]},
D:{name:"Aspartic Acid",codons:["GAT","GAC"]},
C:{name:"Cysteine",codons:["TGT","TGC"]},
Q:{name:"Glutamine",codons:["CAA","CAG"]},
E:{name:"Glutamic Acid",codons:["GAA","GAG"]},
G:{name:"Glycine",codons:["GGT","GGC","GGA","GGG"]},
H:{name:"Histidine",codons:["CAT","CAC"]},
I:{name:"Isoleucine",codons:["ATT","ATC","ATA"]},
L:{name:"Leucine",codons:["TTA","TTG","CTT","CTC","CTA","CTG"]},
K:{name:"Lysine",codons:["AAA","AAG"]},
M:{name:"Methionine",codons:["ATG"]},
F:{name:"Phenylalanine",codons:["TTT","TTC"]},
P:{name:"Proline",codons:["CCT","CCC","CCA","CCG"]},
S:{name:"Serine",codons:["TCT","TCC","TCA","TCG","AGT","AGC"]},
T:{name:"Threonine",codons:["ACT","ACC","ACA","ACG"]},
W:{name:"Tryptophan",codons:["TGG"]},
Y:{name:"Tyrosine",codons:["TAT","TAC"]},
V:{name:"Valine",codons:["GTT","GTC","GTA","GTG"]}
}

const CODON_TO_AA={}
Object.entries(AA_INFO).forEach(([aa,o])=>o.codons.forEach(c=>CODON_TO_AA[c]=aa))


const organisms=["ecoli","pichia","coryne","bacillus"]
let org="ecoli"

const orgButtons=document.getElementById("orgButtons")
organisms.forEach(o=>{
let b=document.createElement("div")
b.className="org"+(o==="ecoli"?" active":"")
b.innerText=o
b.onclick=()=>{
org=o
document.querySelectorAll('.org').forEach(x=>x.classList.remove('active'))
b.classList.add('active')
render()
}
orgButtons.appendChild(b)
})

const CODON_USAGE = {
ecoli:{TTT:0.58,TTC:0.42,TTA:0.13,TTG:0.13,CTT:0.11,CTC:0.10,CTA:0.04,CTG:0.49,ATT:0.50,ATC:0.40,ATA:0.09,ATG:1.00,GTT:0.26,GTC:0.21,GTA:0.16,GTG:0.37,TCT:0.14,TCC:0.15,TCA:0.14,TCG:0.15,AGT:0.16,AGC:0.27,CCT:0.17,CCC:0.13,CCA:0.19,CCG:0.51,ACT:0.17,ACC:0.41,ACA:0.15,ACG:0.27,GCT:0.16,GCC:0.27,GCA:0.22,GCG:0.35,TAT:0.57,TAC:0.43,CAT:0.58,CAC:0.42,CAA:0.33,CAG:0.67,AAT:0.47,AAC:0.53,AAA:0.76,AAG:0.24,GAT:0.63,GAC:0.37,GAA:0.68,GAG:0.32,TGT:0.45,TGC:0.55,TGG:1.00,CGT:0.36,CGC:0.37,CGA:0.07,CGG:0.11,AGA:0.05,AGG:0.03,GGT:0.33,GGC:0.39,GGA:0.12,GGG:0.16,TAA:0.59,TAG:0.08,TGA:0.33},
pichia:{TTT:0.54,TTC:0.46,TTA:0.16,TTG:0.33,CTT:0.16,CTC:0.08,CTA:0.11,CTG:0.16,ATT:0.50,ATC:0.31,ATA:0.18,ATG:1.00,GTT:0.42,GTC:0.23,GTA:0.15,GTG:0.19,TCT:0.29,TCC:0.20,TCA:0.18,TCG:0.09,AGT:0.15,AGC:0.09,CCT:0.35,CCC:0.15,CCA:0.42,CCG:0.09,ACT:0.40,ACC:0.26,ACA:0.24,ACG:0.11,GCT:0.45,GCC:0.26,GCA:0.23,GCG:0.06,TAT:0.47,TAC:0.53,CAT:0.57,CAC:0.43,CAA:0.61,CAG:0.39,AAT:0.48,AAC:0.52,AAA:0.47,AAG:0.53,GAT:0.58,GAC:0.42,GAA:0.56,GAG:0.44,TGT:0.64,TGC:0.36,TGG:1.00,CGT:0.17,CGC:0.05,CGA:0.10,CGG:0.05,AGA:0.48,AGG:0.16,GGT:0.44,GGC:0.14,GGA:0.33,GGG:0.10,TAA:0.51,TAG:0.29,TGA:0.20},
coryne:{TTT:0.37,TTC:0.63,TTA:0.05,TTG:0.20,CTT:0.17,CTC:0.23,CTA:0.06,CTG:0.29,ATT:0.38,ATC:0.59,ATA:0.03,ATG:1.00,GTT:0.29,GTC:0.33,GTA:0.11,GTG:0.27,TCT:0.19,TCC:0.23,TCA:0.13,TCG:0.08,AGT:0.18,AGC:0.19,CCT:0.21,CCC:0.30,CCA:0.27,CCG:0.22,ACT:0.24,ACC:0.40,ACA:0.23,ACG:0.13,GCT:0.25,GCC:0.40,GCA:0.22,GCG:0.13,TAT:0.43,TAC:0.57,CAT:0.44,CAC:0.56,CAA:0.27,CAG:0.73,AAT:0.36,AAC:0.64,AAA:0.32,AAG:0.68,GAT:0.46,GAC:0.54,GAA:0.37,GAG:0.63,TGT:0.42,TGC:0.58,TGG:1.00,CGT:0.09,CGC:0.36,CGA:0.11,CGG:0.44,AGA:0.00,AGG:0.00,GGT:0.28,GGC:0.42,GGA:0.16,GGG:0.14,TAA:0.64,TAG:0.10,TGA:0.26},
bacillus:{TTT:0.60,TTC:0.40,TTA:0.12,TTG:0.12,CTT:0.24,CTC:0.18,CTA:0.06,CTG:0.29,ATT:0.67,ATC:0.33,ATA:0.00,ATG:1.00,GTT:0.36,GTC:0.24,GTA:0.20,GTG:0.20,TCT:0.21,TCC:0.20,TCA:0.14,TCG:0.05,AGT:0.22,AGC:0.18,CCT:0.29,CCC:0.14,CCA:0.43,CCG:0.14,ACT:0.31,ACC:0.27,ACA:0.28,ACG:0.14,GCT:0.36,GCC:0.22,GCA:0.28,GCG:0.14,TAT:0.58,TAC:0.42,CAT:0.58,CAC:0.42,CAA:0.66,CAG:0.34,AAT:0.55,AAC:0.45,AAA:0.74,AAG:0.26,GAT:0.63,GAC:0.37,GAA:0.71,GAG:0.29,TGT:0.61,TGC:0.39,TGG:1.00,CGT:0.36,CGC:0.18,CGA:0.11,CGG:0.11,AGA:0.18,AGG:0.06,GGT:0.34,GGC:0.21,GGA:0.25,GGG:0.20,TAA:0.62,TAG:0.09,TGA:0.29}
}
/* ================= CORE ================= */
let codons=[],orig=[],mut=[],originalCodons=[]

document.getElementById("dnaInput").oninput=e=>{
let dna=e.target.value.toUpperCase().replace(/[^ATGC]/g,"")
codons=[];orig=[];mut=[]
for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){
codons.push(c)
orig.push(CODON_TO_AA[c]||"X")
originalCodons.push(c)
}
}
render()
}

function render(){
let viewer=document.getElementById("viewer")
viewer.innerHTML=""

codons.forEach((c,i)=>{
let aa = CODON_TO_AA[c] || "X"
let usage = CODON_USAGE[org] || {}

let aaCodons = AA_INFO[aa]?.codons || []
let sorted = [...aaCodons].sort((a,b)=>(usage[b]||0)-(usage[a]||0))

let current = usage[c] || 0
let rank = sorted.indexOf(c)

let d=document.createElement("div")
d.className="box border cursor-pointer"

// 🟢 best
if(rank === 0){
  d.classList.add("bg-green-200")
}

// 🔴 rare
if(rank === sorted.length-1 && current < 0.15){
  d.classList.add("bg-red-200")
}

// 🟡 mutated
if(mut.some(m=>m.pos===i)){
  d.classList.add("bg-yellow-200")
}

d.innerHTML=`
<div>${i+1}</div>
<b>${aa}</b>
<div>${c}</div>
<div class="text-[10px] opacity-70">${current.toFixed(2)}</div>
`

d.onclick=e=>{e.stopPropagation();openDD(e,i,d)}

viewer.appendChild(d)
})

/* summary */
let summaryHTML+=`
<div class="px-3 py-1 bg-yellow-100 border rounded-full text-sm">
${m.fromAA}${m.pos+1}${m.toAA}
<span class="text-xs opacity-70 ml-1">
(${m.fromCodon}→${m.toCodon})
</span>
</div>`
})
document.getElementById("mutSummary").innerHTML=summaryHTML

/* DNA */
let dnaHTML=""
codons.forEach((c,i)=>{
dnaHTML+=mut.some(m=>m.pos===i)
? `<span class="px-1 border bg-yellow-200">${c}</span>`
: c
})
document.getElementById("outputDNA").innerHTML=dnaHTML
}

/* dropdown */
function openDD(e,i,box){

let dropdown=document.getElementById("dropdown")
dropdown.innerHTML=""
dropdown.classList.remove("hidden")

let usage = CODON_USAGE[org] || {}

Object.entries(AA_INFO).forEach(([aa,o])=>{

let g=document.createElement("div")
g.innerHTML=`<div class="font-semibold text-xs mt-1">${o.name} (${aa})</div>`

// sort codon by usage
let sorted = [...o.codons].sort((a,b)=>(usage[b]||0)-(usage[a]||0))

sorted.forEach((c,idx)=>{
let val = usage[c] || 0

let row=document.createElement("div")
row.className="flex justify-between cursor-pointer px-2 rounded"

// 🟢 best
if(idx === 0){
  row.classList.add("bg-green-100")
}

// 🔴 rare
if(idx === sorted.length-1 && val < 0.15){
  row.classList.add("bg-red-100")
}

row.innerHTML=`
<span>${c}</span>
<span class="text-xs opacity-70">${val.toFixed(2)}</span>
`

row.onclick=()=>{
apply(i,c)
dropdown.classList.add("hidden")
}

g.appendChild(row)
})

dropdown.appendChild(g)
})

// 📍 position fix (ไม่ลอยบน)
let r=box.getBoundingClientRect()
dropdown.style.left = r.right + 10 + "px"
dropdown.style.top = Math.min(r.top, window.innerHeight - 250) + "px"
}

function apply(i,c){

let oldCodon = codons[i]
let oldAA = orig[i]
let newAA = CODON_TO_AA[c]


mut = mut.filter(m => m.pos !== i)


if(oldCodon !== c){
  mut.push({
    pos:i,
    fromAA:oldAA,
    toAA:newAA,
    fromCodon:oldCodon,
    toCodon:c
  })
}

codons[i] = c
render()
}

/* ================= EXPORT ================= */
function exportWord(){
let nameHTML=document.getElementById("seqName").innerHTML
let originalSeq = originalCodons.join("")
let mutatedSeq = codons.join("")
let mutText = mut.length===0 ? "None" : mut.map(m=>`${m.from}${m.pos+1}${m.to}`).join(", ")

let content=`
<html><body style="font-family:Courier New; font-size:12pt">

<p>>${nameHTML}</p>

<p><b>Reference:</b></p>
<p>${originalSeq}</p>

<p><b>Mutated:</b></p>
<p>${mutatedSeq}</p>

<p><b>Mutations:</b></p>
<p>${mutText}</p>

</body></html>
`

let blob=new Blob(['\ufeff',content],{type:'application/msword'})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="sequence.doc"
a.click()

URL.revokeObjectURL(url)
}

/* ================= BACKUP ================= */
async function backupData(){

let name=document.getElementById("seqName").innerText.trim()
let sequence=codons.join("")
let mutations = mut.length===0
? "None"
: mut.map(m=>`${m.from}${m.pos+1}${m.to}`).join(", ")

await fetch("https://script.google.com/macros/s/AKfycbzPrB-EgpmEg_pqARZf3tG_zw0ObBeWU_0-DTauKhCT9Tscgws_MHgtXFbYdsLrf3NFAQ/exec",{
method:"POST",
mode:"no-cors",
body: JSON.stringify({
  name:name,
  sequence:sequence,
  mutations:mutations
})
})

alert("Backup sent ✅")
}

document.addEventListener("click",()=>{
document.getElementById("dropdown").classList.add("hidden")
})

</script>

</body>
</html>
