<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.nav-btn{padding:8px 14px;border-radius:10px;background:white;cursor:pointer}
.nav-btn.active{background:#4f46e5;color:white}

.box{
  width:64px;height:82px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:12px;
}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-6">
<button class="nav-btn active" onclick="switchPage(event,'mut')">Mutagenesis</button>
</div>

<div class="bg-white p-6 rounded-xl shadow">

<!-- ORGANISM -->
<select id="organism" class="border p-2 rounded mb-4">
<option value="ecoli">E. coli</option>
<option value="pichia">Pichia</option>
</select>

<!-- INPUT -->
<div class="mb-4">
<div class="text-sm text-slate-500 mb-1">DNA Input</div>
<textarea id="dnaInput"
class="w-full p-3 border rounded font-mono focus:ring-2 focus:ring-indigo-400"
placeholder="Paste DNA sequence..."></textarea>
</div>

<!-- VIEWER -->
<div id="viewer" class="flex flex-wrap gap-3 justify-center"></div>

<!-- DROPDOWN -->
<div id="dropdown"
class="absolute hidden bg-white border rounded-xl shadow-lg p-3 text-sm z-[9999] max-h-80 overflow-y-auto"></div>

<!-- OUTPUT -->
<div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">

<div class="bg-slate-50 p-4 rounded-lg">
<div class="text-sm text-slate-500 mb-2">Mutations</div>
<div id="mutSummary" class="flex flex-wrap gap-2"></div>
</div>

<div class="bg-slate-50 p-4 rounded-lg">
<div class="text-sm text-slate-500 mb-2">DNA Output</div>
<textarea id="outputDNA" class="w-full p-2 border rounded font-mono bg-white"></textarea>
<button onclick="copyDNA()" class="mt-2 bg-green-600 text-white px-3 py-1 rounded">
Copy
</button>
</div>

</div>

</div>
</div>

<script>

/* ================= DATA ================= */

const AA_INFO={
A:{name:"Alanine",codons:["GCT","GCC","GCA","GCG"]},
L:{name:"Leucine",codons:["TTA","TTG","CTT","CTC","CTA","CTG"]},
K:{name:"Lysine",codons:["AAA","AAG"]},
M:{name:"Methionine",codons:["ATG"]},
F:{name:"Phenylalanine",codons:["TTT","TTC"]},
V:{name:"Valine",codons:["GTT","GTC","GTA","GTG"]}
}

/* CODON → AA */
const CODON_TO_AA={}
Object.entries(AA_INFO).forEach(([aa,obj])=>{
obj.codons.forEach(c=>CODON_TO_AA[c]=aa)
})

/* USAGE */
const CODON_USAGE={
ecoli:{GCT:0.16,GCC:0.27,GCA:0.22,GCG:0.35,AAA:0.76,AAG:0.24,CTG:0.49,TTT:0.58,TTC:0.42},
pichia:{GCT:0.45,GCC:0.26,GCA:0.23,GCG:0.06,AAA:0.47,AAG:0.53}
}

let codons=[], originalAA=[], mutations=[]

/* ================= AUTO LOAD ================= */

dnaInput.oninput = loadDNA

function loadDNA(){

let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")

codons=[];originalAA=[];mutations=[]

for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){
codons.push(c)
originalAA.push(CODON_TO_AA[c]||"X")
}
}

renderMut()
}

/* ================= RENDER ================= */

function renderMut(){

viewer.innerHTML=""

codons.forEach((c,i)=>{

let aa=CODON_TO_AA[c]||"X"
let usage=CODON_USAGE[organism.value]||{}
let freq=usage[c]||0

let isRare=freq<0.1
let isMut=mutations.some(m=>m.includes(i+1))

let d=document.createElement("div")

d.className=`box border cursor-pointer 
${isMut?"bg-yellow-200":isRare?"bg-red-200":"bg-white hover:bg-slate-100"}`

d.innerHTML=`
<div class="text-xs">${i+1}</div>
<div class="text-lg font-bold">${aa}</div>
<div class="text-xs font-mono">${c}</div>
`

d.onclick=(e)=>{
e.stopPropagation()
openDropdown(e,i,d)
}

viewer.appendChild(d)

})

updateOutput()
}

/* ================= DROPDOWN ================= */

function openDropdown(e,i,box){

dropdown.innerHTML=""

let usage=CODON_USAGE[organism.value]||{}

Object.entries(AA_INFO).forEach(([aa,info])=>{

let group=document.createElement("div")
group.className="mb-2"

group.innerHTML=`<div class="text-xs font-semibold text-slate-600">${info.name} (${aa})</div>`

let list=[...info.codons]
list.sort((a,b)=>(usage[b]||0)-(usage[a]||0))

list.forEach((c,idx)=>{

let freq=usage[c]||0

let row=document.createElement("div")
row.className="flex justify-between px-2 py-1 rounded cursor-pointer hover:bg-slate-100"

if(idx===0) row.classList.add("bg-green-100")

row.innerHTML=`<span>${c}</span><span class="text-xs">${freq.toFixed(2)}</span>`

row.onclick=()=>{
applyMutation(i,c)
dropdown.classList.add("hidden")
}

group.appendChild(row)

})

dropdown.appendChild(group)

})

/* 📍 anchor near box */
let rect=box.getBoundingClientRect()
dropdown.style.left=rect.left+"px"
dropdown.style.top=(rect.bottom+5)+"px"

dropdown.classList.remove("hidden")
}

/* ================= APPLY ================= */

function applyMutation(i,newCodon){

let oldAA=originalAA[i]
let newAA=CODON_TO_AA[newCodon]

if(oldAA!==newAA){
let mut=`${oldAA}${i+1}${newAA}`
if(!mutations.includes(mut))mutations.push(mut)
}

codons[i]=newCodon
renderMut()
}

/* ================= OUTPUT ================= */

function updateOutput(){
outputDNA.value=codons.join("")

mutSummary.innerHTML=""
mutations.forEach(m=>{
let tag=document.createElement("div")
tag.className="px-2 py-1 bg-indigo-100 rounded text-xs"
tag.innerText=m
mutSummary.appendChild(tag)
})
}

function copyDNA(){
navigator.clipboard.writeText(outputDNA.value)
}

/* CLOSE */
document.addEventListener("click",(e)=>{
if(!e.target.closest("#dropdown")) dropdown.classList.add("hidden")
})

</script>

</body>
</html>
