<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pa1oLAB v2</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.nav-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  cursor: pointer;
}
.nav-btn.active { background:#4f46e5; color:white; }

.copy-success {
  background:#22c55e !important;
  color:white !important;
}

.spinner {
  border: 2px solid #fff;
  border-top: 2px solid transparent;
  border-radius: 50%;
  width: 12px;
  height: 12px;
  animation: spin 0.6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">

<div class="max-w-6xl mx-auto p-8">

<h1 class="text-2xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<div class="bg-white rounded-xl p-6 shadow">

<input id="maskInput"
  class="w-full max-w-xl mx-auto block p-2 border rounded font-mono text-center mb-4"
  placeholder="Paste sequence">

<div class="flex justify-center gap-2 mb-2">
  <button id="btnManual" class="nav-btn active">Manual</button>
  <button id="btnSlide" class="nav-btn">Sliding</button>
</div>

<p id="modeLabel" class="text-center text-xs mb-4">Mode: Manual</p>

<div class="flex justify-center gap-3 mb-4">
  <input id="winVal" type="number" value="5" class="w-16 border rounded text-center">
  <input id="stepVal" type="number" value="1" class="w-16 border rounded text-center">

  <button id="genBtn" class="bg-indigo-600 text-white px-3 rounded flex items-center gap-2">
    Generate
  </button>
</div>

<div id="grid" class="flex flex-wrap gap-2 justify-center mb-4"></div>

<div class="bg-slate-100 p-3 rounded">
  <div class="flex justify-between mb-2">
    <span class="text-xs">Library</span>
    <button id="copyAllBtn" class="text-xs bg-indigo-600 text-white px-2 rounded">Copy All</button>
  </div>
  <div id="libList" class="space-y-2 max-h-48 overflow-y-auto"></div>
</div>

</div>
</div>

<script>

let sequence = ""
let mode = "manual"
let manualMask = []
let library = []

const grid = document.getElementById("grid")

/* INPUT */
document.getElementById("maskInput").oninput = e => {
  sequence = e.target.value.toUpperCase()
  renderGrid()
}

/* MODE */
document.getElementById("btnManual").onclick = () => {
  mode = "manual"
  updateMode()
}
document.getElementById("btnSlide").onclick = () => {
  mode = "slide"
  updateMode()
}

function updateMode(){
  document.getElementById("modeLabel").innerText = "Mode: " + mode
  document.getElementById("btnManual").classList.toggle("active", mode==="manual")
  document.getElementById("btnSlide").classList.toggle("active", mode==="slide")
}

/* GRID */
function renderGrid(){
  grid.innerHTML = ""
  manualMask = []

  sequence.split("").forEach((aa,i)=>{
    const box = document.createElement("div")
    box.className = "w-12 h-14 border rounded flex flex-col items-center justify-center cursor-pointer"

    box.innerHTML = `
      <div class="font-bold">${aa}</div>
      <div class="text-[10px]">${i+1}</div>
    `

    box.onclick = () => {
      if(mode !== "manual") return

      if(manualMask.includes(i)){
        manualMask = manualMask.filter(x=>x!==i)
        box.classList.remove("bg-red-400","text-white")
      } else {
        manualMask.push(i)
        box.classList.add("bg-red-400","text-white")
      }
    }

    grid.appendChild(box)
  })
}

/* GENERATE */
document.getElementById("genBtn").onclick = () => {

  const btn = document.getElementById("genBtn")
  btn.innerHTML = `<span class="spinner"></span> Generating...`

  setTimeout(()=>{

    let newLib = []

    /* manual */
    if(manualMask.length){
      let arr = sequence.split("")
      manualMask.forEach(i=> arr[i]="_")
      newLib.push(arr.join(""))
    }

    /* sliding */
    let w = parseInt(document.getElementById("winVal").value)
    let s = parseInt(document.getElementById("stepVal").value)

    for(let i=0;i<=sequence.length-w;i+=s){
      let arr = sequence.split("")
      for(let j=0;j<w;j++) arr[i+j]="_"
      newLib.push(arr.join(""))
    }

    /* merge without duplicate */
    newLib.forEach(seq=>{
      if(!library.includes(seq)){
        library.push(seq)
      }
    })

    renderList()

    btn.innerHTML = "Generate"

  },300)
}

/* RENDER */
function renderList(){
  const container = document.getElementById("libList")
  container.innerHTML = ""

  library.forEach((seq,index)=>{
    const row = document.createElement("div")
    row.className = "flex justify-between items-center bg-white p-2 rounded"

    const span = document.createElement("span")
    span.className = "font-mono text-xs"
    span.innerText = seq

    const actions = document.createElement("div")
    actions.className = "flex gap-2"

    const copyBtn = document.createElement("button")
    copyBtn.className = "text-xs bg-slate-200 px-2 rounded"
    copyBtn.innerText = "Copy"
    copyBtn.onclick = () => copy(copyBtn, seq)

    const delBtn = document.createElement("button")
    delBtn.className = "text-xs text-red-500"
    delBtn.innerText = "✕"
    delBtn.onclick = () => {
      library.splice(index,1)
      renderList()
    }

    actions.appendChild(copyBtn)
    actions.appendChild(delBtn)

    row.appendChild(span)
    row.appendChild(actions)

    container.appendChild(row)
  })
}

/* COPY */
document.getElementById("copyAllBtn").onclick = () => {
  copy(document.getElementById("copyAllBtn"), library.join("\\n"))
}

function copy(btn,text){
  navigator.clipboard.writeText(text)
  btn.classList.add("copy-success")
  btn.innerText = "✓"
  setTimeout(()=>{
    btn.classList.remove("copy-success")
    btn.innerText = "Copy"
  },700)
}

</script>

</body>
</html>
