/* TAB */
function switchTab(id,el){
document.getElementById("mask").classList.add("hidden")
document.getElementById("mut").classList.add("hidden")
document.getElementById(id).classList.remove("hidden")
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))
el.classList.add("active")
}

/* ================= MASK ================= */
let maskSeq="",maskSet=new Set(),library=[]

document.getElementById("maskInput").oninput=e=>{
maskSeq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
renderMask()
}

function renderMask(){

let grid=document.getElementById("maskGrid")
grid.innerHTML=""

maskSeq.split("").forEach((a,i)=>{

let d=document.createElement("div")
d.className="mask-box border cursor-pointer transition"

// 🔥 สี
if(maskSet.has(i)){
d.classList.add("bg-red-500","text-white","scale-105")
}else{
d.classList.add("bg-white")
}

// 🔥 layout ใหม่
d.innerHTML=`
<div class="text-xs opacity-60">${i+1}</div>
<div class="text-lg font-semibold">${a}</div>
`

// 🔥 click
d.onclick=()=>{
maskSet.has(i)?maskSet.delete(i):maskSet.add(i)
renderMask()
}

grid.appendChild(d)

})

}

/* ================= MASK LOGIC ================= */

function generateMask(){

library=[]

let w=+document.getElementById("win").value
let s=+document.getElementById("step").value

for(let i=0;i<=maskSeq.length-w;i+=s){
let arr=[...maskSeq]
for(let j=0;j<w;j++) arr[i+j]="_"
library.push(arr.join(""))
}

document.getElementById("maskLib").innerHTML =
library.map(x=>`
<div class="flex justify-between items-center px-2 py-1 hover:bg-gray-100 rounded">
<span>${x}</span>
<button onclick="copyOne('${x}')" class="text-xs text-gray-400 hover:text-black">copy</button>
</div>
`).join("")

}

function generateManualMask(){

library=[]

let arr=[...maskSeq]

maskSet.forEach(i=>{
arr[i]="_"
})

library.push(arr.join(""))

document.getElementById("maskLib").innerHTML =
library.map(x=>`
<div class="flex justify-between items-center px-2 py-1 hover:bg-gray-100 rounded">
<span>${x}</span>
<button onclick="copyOne('${x}')" class="text-xs text-gray-400 hover:text-black">copy</button>
</div>
`).join("")

}

function handleGenerate(){
if(maskMode==="manual"){
generateManualMask()
}else{
generateMask()
}
}

function handleCopy(){

if(maskMode==="manual"){
generateManualMask()
}

if(!library.length){
alert("No library")
return
}

navigator.clipboard.writeText(
  library.map(seq => `"${seq}"`).join(", ")
)

// 🔥 animation
let toast = document.getElementById("copyToast")

toast.classList.remove("opacity-0")
toast.classList.add("opacity-100")

setTimeout(()=>{
toast.classList.remove("opacity-100")
toast.classList.add("opacity-0")
},1200)

}

function copyOne(seq){

navigator.clipboard.writeText(seq)

let toast = document.getElementById("copyToast")

toast.innerText = "Copied 1 ✓"
toast.classList.remove("opacity-0")
toast.classList.add("opacity-100")

setTimeout(()=>{
toast.classList.remove("opacity-100")
toast.classList.add("opacity-0")
toast.innerText = "Copied ✓"
},1000)

}

let dna = e.target.value.toUpperCase().replace(/[^ATGC]/g,"")

// 🔥 reset ทุกอย่าง (แก้ REF เพี้ยน)
codons=[];orig=[];mut=[];originalCodons=[]

for(let i=0;i<dna.length;i+=3){

let c=dna.slice(i,i+3)

if(c.length===3){
codons.push(c)

  document.getElementById("targetSeqInput").oninput = () => {
  renderTargetPreview()
}

  function translateInputToAA(seq){

  seq = seq.toUpperCase().replace(/[^A-Z]/g,"")

  if(/^[ATGC]+$/.test(seq) && seq.length % 3 === 0){

    let aaSeq = ""

    for(let i = 0; i < seq.length; i += 3){
      let codon = seq.slice(i, i + 3)
      aaSeq += CODON_TO_AA[codon] || "X"
    }

    return aaSeq
  }

  return seq.replace(/[^ARNDCQEGHILKMFPSTWYVX]/g,"")
}

function renderTargetPreview(){

  let box = document.getElementById("targetPreview")
  let input = document.getElementById("targetSeqInput").value.trim()

  if(!input){
    box.innerHTML = "No target sequence"
    return
  }

  if(orig.length === 0){
    box.innerHTML = `<span class="text-red-500">Please input reference DNA sequence first</span>`
    return
  }

  let refAA = orig.join("")
  let targetAA = translateInputToAA(input)

  if(refAA.length !== targetAA.length){
    box.innerHTML = `
      <div class="text-red-500">
        Length mismatch<br>
        Ref AA length: ${refAA.length}<br>
        Target AA length: ${targetAA.length}
      </div>
    `
    return
  }

  let muts = []
  let visual = ""

  for(let i = 0; i < refAA.length; i++){

    let r = refAA[i]
    let t = targetAA[i]

    if(r !== t){
      muts.push(`${r}${i+1}${t}`)
      visual += `<span class="bg-yellow-300 px-1 rounded">${t}</span>`
    }else{
      visual += t
    }
  }

  box.innerHTML = `
    <div class="mb-2">
      <span class="font-semibold">Target AA:</span>
      <span class="break-all">${visual}</span>
    </div>

    <div>
      <span class="font-semibold">Preview Mutations:</span>
      ${
        muts.length
        ? muts.map(x => `<span class="inline-block bg-yellow-100 border rounded-full px-2 py-0.5 mr-1 mb-1">${x}</span>`).join("")
        : `<span class="text-gray-500">No mutation</span>`
      }
    </div>
  `
}
  
function render(){
let viewer=document.getElementById("viewer")
viewer.innerHTML=""

codons.forEach((c,i)=>{
let aa = CODON_TO_AA[c] || "X"
let usage = CODON_USAGE[org] || {}

let aaCodons = AA_INFO[aa]?.codons || []
let sorted = [...aaCodons].sort((a,b)=>(usage[b]||0)-(usage[a]||0))

let current = usage[c] || 0
let rank = sorted.indexOf(c)

let d=document.createElement("div")
d.className="box border cursor-pointer"

// 🟢 best
if(rank === 0){
  d.classList.add("bg-green-200")
}

// 🔴 rare
let cutoff = parseFloat(document.getElementById("cutoff").value) || 0.15

if(current < cutoff){
  d.classList.add("bg-red-200")
}

// 🟡 mutated
if(mut.some(m=>m.pos===i)){
  d.classList.add("bg-yellow-200")
}

d.innerHTML=`
<div class="text-[11px] opacity-60">${i+1}</div>

<div class="text-lg font-semibold">${aa}</div>

<div class="text-xs tracking-wide">${c}</div>

<div class="text-[10px] opacity-50">${current.toFixed(2)}</div>
`

d.onclick=e=>{e.stopPropagation();openDD(e,i,d)}

viewer.appendChild(d)
})

/* summary */
let summaryHTML = ""

mut.forEach(m => {

summaryHTML += `
<div class="px-3 py-1 bg-yellow-100 border rounded-full text-sm">

${(m.fromAA || m.from)}${m.pos+1}${(m.toAA || m.to)}

<span class="text-xs opacity-70 ml-1">
${m.fromCodon ? `(${m.fromCodon}→${m.toCodon})` : ""}
</span>

</div>
`

})

document.getElementById("mutSummary").innerHTML = summaryHTML
/* DNA */
let dnaHTML=""
codons.forEach((c,i)=>{
dnaHTML+=mut.some(m=>m.pos===i)
? `<span class="px-1 border bg-yellow-200">${c}</span>`
: c
})
document.getElementById("outputDNA").innerHTML=dnaHTML

renderTargetPreview()
}

/* dropdown */
function openDD(e,i,box){

let dropdown=document.getElementById("dropdown")
dropdown.innerHTML=""
dropdown.classList.remove("hidden")

let usage = CODON_USAGE[org] || {}

Object.entries(AA_INFO).forEach(([aa,o])=>{

let g=document.createElement("div")
g.innerHTML=`<div class="font-semibold text-xs mt-1">${o.name} (${aa})</div>`

// sort codon by usage
let sorted = [...o.codons].sort((a,b)=>(usage[b]||0)-(usage[a]||0))

sorted.forEach((c,idx)=>{
let val = usage[c] || 0

let row=document.createElement("div")
row.className="flex justify-between cursor-pointer px-2 rounded"

// 🟢 best
if(idx === 0){
  row.classList.add("bg-green-100")
}

// 🔴 rare
let cutoff = parseFloat(document.getElementById("cutoff").value) || 0.15

if(val < cutoff){
  row.classList.add("bg-red-100")
}

row.innerHTML=`
<span>${c}</span>
<span class="text-xs opacity-70">${val.toFixed(2)}</span>
`

row.onclick=()=>{
apply(i,c)
dropdown.classList.add("hidden")
}

g.appendChild(row)
})

dropdown.appendChild(g)
})

// 📍 position fix (ไม่ลอยบน)
let r=box.getBoundingClientRect()
dropdown.style.left = r.right + 10 + "px"
dropdown.style.top = Math.min(r.top, window.innerHeight - 250) + "px"
}

function apply(i,c){

let oldCodon = codons[i]
let oldAA = orig[i]
let newAA = CODON_TO_AA[c]


mut = mut.filter(m => m.pos !== i)


if(oldCodon !== c){
  mut.push({
    pos:i,
    fromAA:oldAA,
    toAA:newAA,
    fromCodon:oldCodon,
    toCodon:c
  })
}

codons[i] = c
render()
}

/* ================= EXPORT ================= */
function exportWord(){

let nameHTML=document.getElementById("seqName").innerHTML

let originalSeq = originalCodons.join("")
let mutatedSeq = codons.join("")

let mutText = mut.length===0
? "None"
: mut.map(m=>`${(m.fromAA || m.from)}${m.pos+1}${(m.toAA || m.to)}`).join(", ")

let content=`
<html><body style="font-family:Courier New; font-size:12pt">

<p>>${nameHTML}</p>

<p><b>Reference:</b></p>
<p>${originalSeq}</p>

<p><b>Mutated:</b></p>
<p>${mutatedSeq}</p>

<p><b>Mutations:</b></p>
<p>${mutText}</p>

</body></html>
`

let blob=new Blob(['\ufeff',content],{type:'application/msword'})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="sequence.doc"
a.click()

URL.revokeObjectURL(url)
}

let text = document.getElementById("backupText")
let spinner = document.getElementById("backupSpinner")

// 🔥 start loading
btn.classList.add("opacity-60","cursor-wait")
spinner.classList.remove("hidden")
text.innerHTML = "Saving..."

let name=document.getElementById("seqName").innerText.trim()
let sequence=codons.join("")
let mutations = mut.length===0
? "None"
: mut.map(m=>`${(m.fromAA||m.from)}${m.pos+1}${(m.toAA||m.to)}`).join(", ")

await fetch("https://script.google.com/macros/s/AKfycbzPrB-EgpmEg_pqARZf3tG_zw0ObBeWU_0-DTauKhCT9Tscgws_MHgtXFbYdsLrf3NFAQ/exec",{
method:"POST",
mode:"no-cors",
body: JSON.stringify({name,sequence,mutations})
})

// ✅ finish
spinner.classList.add("hidden")
text.innerHTML = "Saved ✓"
btn.classList.remove("opacity-60","cursor-wait")

  text.innerHTML = "Backup"
},1500)

}

/* 🔥 STEP 3 วางตรงนี้ */
const cutoffInput = document.getElementById("cutoff")
const cutoffSlider = document.getElementById("cutoffSlider")
const cutoffLabel = document.getElementById("cutoffLabel")

function updateCutoffUI(val){

  cutoffInput.value = val
  cutoffSlider.value = val

  if(val < 0.12) cutoffLabel.innerText = "Relaxed"
  else if(val < 0.25) cutoffLabel.innerText = "Balanced"
  else cutoffLabel.innerText = "Strict"

  render()
}
function setCutoffPreset(val){
  updateCutoffUI(val)

  document.querySelectorAll(".cutoffPreset").forEach(btn=>{
    btn.classList.remove(
      "bg-indigo-50",
      "text-indigo-600",
      "border-indigo-400",
      "font-semibold"
    )
  })

  document.querySelectorAll(".cutoffPreset").forEach(btn=>{
    if(parseFloat(btn.innerText) === val){
      btn.classList.add(
        "bg-indigo-50",
        "text-indigo-600",
        "border-indigo-400",
        "font-semibold"
      )
    }
  })
}
cutoffSlider.oninput = e => {
  updateCutoffUI(parseFloat(e.target.value))
}

cutoffInput.oninput = e => {
  let v = parseFloat(e.target.value) || 0.15
  updateCutoffUI(v)
}
