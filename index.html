<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pa1oLAB v2</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.btn { padding:6px 12px; border-radius:6px; background:#eee; cursor:pointer; }
.btn.active { background:#4f46e5; color:white; }
.copy-success { background:#22c55e !important; color:white !important; }
.spinner {
  width:12px;height:12px;border:2px solid #fff;border-top:2px solid transparent;
  border-radius:50%;animation:spin .6s linear infinite;display:inline-block;
}
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">

<h2 class="text-lg mb-4">🎭 Masking Engine</h2>

<input id="seqInput" class="w-full border p-2 mb-4 text-center font-mono" placeholder="Paste sequence">

<div class="flex gap-2 justify-center mb-2">
  <button id="manualBtn" class="btn active">Manual</button>
  <button id="slideBtn" class="btn">Sliding</button>
</div>

<p id="modeLabel" class="text-center text-xs mb-4">Mode: manual</p>

<div class="flex gap-2 justify-center mb-4">
  <input id="win" type="number" value="5" class="w-16 border text-center">
  <input id="step" type="number" value="1" class="w-16 border text-center">
  <button id="genBtn" class="btn bg-indigo-600 text-white">Generate</button>
</div>

<div id="grid" class="flex flex-wrap gap-2 justify-center mb-4"></div>

<div class="bg-slate-100 p-3 rounded">
  <div class="flex justify-between mb-2">
    <span class="text-xs">Library</span>
    <button id="copyAll" class="btn bg-indigo-600 text-white text-xs">Copy All</button>
  </div>
  <div id="list" class="space-y-2 max-h-40 overflow-y-auto"></div>
</div>

</div>

<script>

/* STATE */
let sequence = ""
let mode = "manual"
let manualMask = new Set()
let library = []

/* ELEMENTS */
const grid = document.getElementById("grid")
const list = document.getElementById("list")

/* INPUT */
document.getElementById("seqInput").oninput = e => {
  sequence = e.target.value.toUpperCase()
  manualMask.clear()
  renderGrid()
}

/* MODE */
document.getElementById("manualBtn").onclick = () => {
  mode="manual"
  updateMode()
}
document.getElementById("slideBtn").onclick = () => {
  mode="slide"
  updateMode()
}

function updateMode(){
  document.getElementById("modeLabel").innerText="Mode: "+mode
  document.getElementById("manualBtn").classList.toggle("active",mode==="manual")
  document.getElementById("slideBtn").classList.toggle("active",mode==="slide")
}

/* GRID */
function renderGrid(){
  grid.innerHTML=""

  sequence.split("").forEach((aa,i)=>{
    const box=document.createElement("div")
    box.className="w-10 h-12 border rounded flex flex-col justify-center items-center cursor-pointer"

    box.innerHTML=`<div>${aa}</div><div style="font-size:10px">${i+1}</div>`

    box.onclick=()=>{
      if(mode!=="manual") return

      if(manualMask.has(i)){
        manualMask.delete(i)
        box.style.background=""
      }else{
        manualMask.add(i)
        box.style.background="#f87171"
      }
    }

    grid.appendChild(box)
  })
}

/* GENERATE */
document.getElementById("genBtn").onclick = () => {

  const btn = document.getElementById("genBtn")
  btn.innerHTML=`<span class="spinner"></span>`

  setTimeout(()=>{

    let newSeqs = []

    /* manual */
    if(manualMask.size){
      let arr=[...sequence]
      manualMask.forEach(i=>arr[i]="_")
      newSeqs.push(arr.join(""))
    }

    /* sliding */
    let w = +document.getElementById("win").value
    let s = +document.getElementById("step").value

    for(let i=0;i<=sequence.length-w;i+=s){
      let arr=[...sequence]
      for(let j=0;j<w;j++) arr[i+j]="_"
      newSeqs.push(arr.join(""))
    }

    /* merge unique */
    newSeqs.forEach(seq=>{
      if(!library.includes(seq)) library.push(seq)
    })

    renderList()

    btn.innerHTML="Generate"

  },200)
}

/* LIST */
function renderList(){
  list.innerHTML=""

  library.forEach(seq=>{
    const row=document.createElement("div")
    row.className="flex justify-between bg-white p-2 rounded"

    const txt=document.createElement("span")
    txt.className="font-mono text-xs"
    txt.innerText=seq

    const actions=document.createElement("div")
    actions.className="flex gap-2"

    const copyBtn=document.createElement("button")
    copyBtn.className="btn text-xs"
    copyBtn.innerText="Copy"
    copyBtn.onclick=()=>copy(copyBtn,seq)

    const delBtn=document.createElement("button")
    delBtn.innerText="✕"
    delBtn.className="text-red-500 text-xs"
    delBtn.onclick=()=>{
      library = library.filter(s=>s!==seq)
      renderList()
    }

    actions.append(copyBtn,delBtn)
    row.append(txt,actions)
    list.appendChild(row)
  })
}

/* COPY */
document.getElementById("copyAll").onclick=()=>{
  copy(document.getElementById("copyAll"),library.join("\n"))
}

function copy(btn,text){
  navigator.clipboard.writeText(text)
  btn.classList.add("copy-success")
  btn.innerText="✓"
  setTimeout(()=>{
    btn.classList.remove("copy-success")
    btn.innerText="Copy"
  },700)
}

</script>

</body>
</html>
