<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.nav{padding:8px 14px;border-radius:10px;background:white;cursor:pointer}
.nav.active{background:#4f46e5;color:white}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl mb-6">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-6">
  <button class="nav active" onclick="show('align')">Alignment</button>
  <button class="nav" onclick="show('mask')">Masking</button>
  <button class="nav" onclick="show('mut')">Mutagenesis</button>
</div>

<div class="bg-white p-6 rounded shadow">

<!-- ALIGN -->
<div id="align">
<textarea id="alignInput" class="w-full border p-2 mb-3 font-mono"></textarea>
<button onclick="runAlign()" class="bg-indigo-600 text-white px-3 py-1 rounded">Align</button>
<div id="alignOut" class="font-mono mt-3"></div>
</div>

<!-- MASK -->
<div id="mask" class="hidden">
<input id="maskInput" class="w-full border p-2 mb-3 font-mono">

<div id="grid" class="flex flex-wrap gap-1"></div>

<button onclick="genMask()" class="bg-indigo-600 text-white px-3 py-1 mt-2">Generate</button>

<div id="maskOut" class="mt-3 font-mono"></div>
</div>

<!-- MUT -->
<div id="mut" class="hidden">

<select id="org" class="border p-2 mb-2">
<option value="ecoli">E. coli</option>
<option value="yeast">Yeast</option>
<option value="pichia">Pichia</option>
</select>

<textarea id="dna" class="w-full border p-2 mb-3 font-mono"></textarea>
<button onclick="loadDNA()" class="bg-indigo-600 text-white px-3 py-1">Load</button>

<div id="viewer" class="font-mono mt-3"></div>

<div id="mutList" class="mt-3 text-sm"></div>

<textarea id="outDNA" class="w-full border p-2 mt-3 font-mono"></textarea>

</div>

</div>
</div>

<script>

/* NAV */
function show(id){
  document.querySelectorAll("#align,#mask,#mut").forEach(x=>x.classList.add("hidden"))
  document.getElementById(id).classList.remove("hidden")

  document.querySelectorAll(".nav").forEach(b=>b.classList.remove("active"))
  event.target.classList.add("active")
}

/* ================= ALIGN ================= */
function runAlign(){
  let t=alignInput.value.trim().split("\n")
  alignOut.innerHTML=t.map(x=>x).join("<br>")
}

/* ================= MASK ================= */
let maskSet=new Set()

maskInput.oninput=e=>{
  let seq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
  maskInput.value=seq
  renderMask(seq)
}

function renderMask(seq){
  grid.innerHTML=""
  seq.split("").forEach((aa,i)=>{
    let b=document.createElement("div")
    b.className="w-8 text-center border cursor-pointer"

    if(maskSet.has(i)) b.classList.add("bg-red-400","text-white")

    b.innerHTML=aa+"<div style='font-size:10px'>"+(i+1)+"</div>"

    b.onclick=()=>{
      maskSet.has(i)?maskSet.delete(i):maskSet.add(i)
      renderMask(seq)
    }

    grid.appendChild(b)
  })
}

function genMask(){
  let seq=maskInput.value.split("")
  maskSet.forEach(i=>seq[i]="_")
  maskOut.innerText=seq.join("")
}

/* ================= MUT ================= */

const CODON = {
  ecoli:{K:"AAA",L:"CTG",A:"GCG",M:"ATG"},
  yeast:{K:"AAA",L:"TTG",A:"GCT",M:"ATG"},
  pichia:{K:"AAG",L:"TTG",A:"GCT",M:"ATG"}
}

const AA={
"ATG":"M","AAA":"K","AAG":"K","GCT":"A","GCG":"A","TTG":"L","CTG":"L"
}

let codons=[]
let mut=[]

function loadDNA(){
  let s=dna.value.toUpperCase().replace(/[^ATGC]/g,"")
  codons=[]
  mut=[]

  for(let i=0;i<s.length;i+=3){
    codons.push(s.slice(i,i+3))
  }
  renderMut()
}

function renderMut(){
  viewer.innerHTML=""

  codons.forEach((c,i)=>{
    let aa=AA[c]||"X"

    let d=document.createElement("div")
    d.className="inline-block m-1 text-center cursor-pointer"

    d.innerHTML=`${i+1}<br>${c}<br><b>${aa}</b>`

    d.onclick=()=>{
      let newAA=prompt("Mutate to:")
      if(!newAA)return

      let cod=CODON[org.value][newAA]
      if(!cod)return alert("no codon")

      mut.push(aa+(i+1)+newAA)
      codons[i]=cod
      renderMut()
    }

    viewer.appendChild(d)
  })

  outDNA.value=codons.join("")
  mutList.innerText=mut.join(" ")
}

</script>

</body>
</html>
