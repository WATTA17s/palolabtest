<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}

.tab{
  padding:6px 14px;
  border-radius:8px;
  background:white;
  cursor:pointer;
}
.tab.active{
  background:#4f46e5;
  color:white;
}

.box{
  width:64px;height:84px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:12px;
}

.org{
  padding:5px 12px;
  border-radius:999px;
  border:1px solid #ddd;
  cursor:pointer;
}
.org.active{
  background:#4f46e5;
  color:white;
}

/* 🔥 สำคัญ */
#dropdown{
  pointer-events:none;
}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl mb-4">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-4">
<div class="tab active" onclick="showTab('mask',this)">Masking</div>
<div class="tab" onclick="showTab('mut',this)">Mutagenesis</div>
</div>

<div class="bg-white p-6 rounded shadow">

<!-- ================= MASK ================= -->
<div id="mask">

<input id="maskInput" class="w-full p-3 border rounded mb-3 text-center" placeholder="Protein">

<div id="maskGrid" class="flex flex-wrap gap-2"></div>

</div>

<!-- ================= MUT ================= -->
<div id="mut" class="hidden relative">

<div class="flex gap-2 mb-3">
<div class="org active" onclick="setOrg('ecoli',this)">E. coli</div>
<div class="org" onclick="setOrg('pichia',this)">Pichia</div>
</div>

<textarea id="dnaInput" class="w-full p-3 border rounded mb-3"></textarea>

<div id="viewer" class="flex flex-wrap gap-2"></div>

<div id="dropdown"
class="absolute hidden bg-white border rounded shadow p-2 text-sm z-50 max-h-80 overflow-y-auto"></div>

</div>

</div>
</div>

<script>

/* ================= TAB FIX ================= */
function showTab(id,el){

  // 🔥 ปิด dropdown ทุกครั้ง
  dropdown.classList.add("hidden")
  dropdown.style.pointerEvents="none"

  document.getElementById("mask").classList.add("hidden")
  document.getElementById("mut").classList.add("hidden")

  document.getElementById(id).classList.remove("hidden")

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))
  el.classList.add("active")
}

/* ================= MASK ================= */
maskInput.oninput=e=>{
let seq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")

maskGrid.innerHTML=""

seq.split("").forEach((a,i)=>{
let d=document.createElement("div")
d.className="box border"
d.innerHTML=`<div>${i+1}</div><b>${a}</b>`
maskGrid.appendChild(d)
})
}

/* ================= MUT ================= */

let org="ecoli"
function setOrg(o,el){
org=o
document.querySelectorAll('.org').forEach(x=>x.classList.remove('active'))
el.classList.add('active')
render()
}

/* AA */
const AA_INFO={
A:["GCT","GCC","GCA","GCG"],
R:["CGT","CGC","CGA","CGG","AGA","AGG"],
N:["AAT","AAC"],
D:["GAT","GAC"],
C:["TGT","TGC"],
Q:["CAA","CAG"],
E:["GAA","GAG"],
G:["GGT","GGC","GGA","GGG"],
H:["CAT","CAC"],
I:["ATT","ATC","ATA"],
L:["TTA","TTG","CTT","CTC","CTA","CTG"],
K:["AAA","AAG"],
M:["ATG"],
F:["TTT","TTC"],
P:["CCT","CCC","CCA","CCG"],
S:["TCT","TCC","TCA","TCG","AGT","AGC"],
T:["ACT","ACC","ACA","ACG"],
W:["TGG"],
Y:["TAT","TAC"],
V:["GTT","GTC","GTA","GTG"]
}

const CODON_TO_AA={}
Object.entries(AA_INFO).forEach(([aa,list])=>{
list.forEach(c=>CODON_TO_AA[c]=aa)
})

/* 🔥 FULL TABLE */
const CODON_USAGE = {
ecoli:{TTT:0.58,TTC:0.42,TTA:0.13,TTG:0.13,CTT:0.11,CTC:0.10,CTA:0.04,CTG:0.49,ATT:0.50,ATC:0.40,ATA:0.09,ATG:1.00,GTT:0.26,GTC:0.21,GTA:0.16,GTG:0.37,TCT:0.14,TCC:0.15,TCA:0.14,TCG:0.15,AGT:0.16,AGC:0.27,CCT:0.17,CCC:0.13,CCA:0.19,CCG:0.51,ACT:0.17,ACC:0.41,ACA:0.15,ACG:0.27,GCT:0.16,GCC:0.27,GCA:0.22,GCG:0.35,TAT:0.57,TAC:0.43,CAT:0.58,CAC:0.42,CAA:0.33,CAG:0.67,AAT:0.47,AAC:0.53,AAA:0.76,AAG:0.24,GAT:0.63,GAC:0.37,GAA:0.68,GAG:0.32,TGT:0.45,TGC:0.55,TGG:1.00,CGT:0.36,CGC:0.37,CGA:0.07,CGG:0.11,AGA:0.05,AGG:0.03,GGT:0.33,GGC:0.39,GGA:0.12,GGG:0.16,TAA:0.59,TAG:0.08,TGA:0.33},
pichia:{TTT:0.54,TTC:0.46,TTA:0.16,TTG:0.33,CTT:0.16,CTC:0.08,CTA:0.11,CTG:0.16,ATT:0.50,ATC:0.31,ATA:0.18,ATG:1.00,GTT:0.42,GTC:0.23,GTA:0.15,GTG:0.19,TCT:0.29,TCC:0.20,TCA:0.18,TCG:0.09,AGT:0.15,AGC:0.09,CCT:0.35,CCC:0.15,CCA:0.42,CCG:0.09,ACT:0.40,ACC:0.26,ACA:0.24,ACG:0.11,GCT:0.45,GCC:0.26,GCA:0.23,GCG:0.06,TAT:0.47,TAC:0.53,CAT:0.57,CAC:0.43,CAA:0.61,CAG:0.39,AAT:0.48,AAC:0.52,AAA:0.47,AAG:0.53,GAT:0.58,GAC:0.42,GAA:0.56,GAG:0.44,TGT:0.64,TGC:0.36,TGG:1.00,CGT:0.17,CGC:0.05,CGA:0.10,CGG:0.05,AGA:0.48,AGG:0.16,GGT:0.44,GGC:0.14,GGA:0.33,GGG:0.10,TAA:0.51,TAG:0.29,TGA:0.20}
}

let codons=[],orig=[],mut=[]

dnaInput.oninput=load

function load(){
let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")
codons=[];orig=[];mut=[]

for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){
codons.push(c)
orig.push(CODON_TO_AA[c]||"X")
}
}
render()
}

function render(){
viewer.innerHTML=""
let usage=CODON_USAGE[org]

codons.forEach((c,i)=>{

let aa=CODON_TO_AA[c]||"X"
let f=usage[c]||0

let d=document.createElement("div")
d.className="box border cursor-pointer"

if(f<0.1) d.classList.add("bg-red-200")

d.innerHTML=`<div>${i+1}</div><b>${aa}</b><div>${c}</div>`

viewer.appendChild(d)
})
}

</script>

</body>
</html>
