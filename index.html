<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.box{
  width:64px;height:84px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:12px;
}
.tab{padding:6px 12px;border-radius:8px;background:white;cursor:pointer}
.tab.active{background:#4f46e5;color:white}
.org{padding:4px 10px;border-radius:999px;border:1px solid #ddd;cursor:pointer}
.org.active{background:#4f46e5;color:white}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl mb-4">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-4">
<div class="tab active" onclick="switchTab('mask',this)">Masking</div>
<div class="tab" onclick="switchTab('mut',this)">Mutagenesis</div>
</div>

<div class="bg-white p-6 rounded shadow">

<!-- ================= MASK ================= -->
<div id="mask">

<input id="maskInput"
class="w-full p-3 border rounded mb-3 text-center"
placeholder="Protein (1-letter only)">

<div id="maskGrid" class="flex flex-wrap gap-2"></div>

</div>

<!-- ================= MUT ================= -->
<div id="mut" class="hidden relative">

<div class="flex gap-2 mb-3" id="orgButtons"></div>

<textarea id="dnaInput" class="w-full p-3 border rounded mb-3"></textarea>

<div id="viewer" class="flex flex-wrap gap-2"></div>

<div id="dropdown"
class="absolute hidden bg-white border rounded shadow p-3 text-sm z-50 max-h-80 overflow-y-auto"></div>

<div class="mt-3">
<div id="mutSummary" class="flex gap-2 flex-wrap"></div>
<textarea id="outputDNA" class="w-full border p-2 mt-2 font-mono"></textarea>
</div>

</div>

</div>
</div>

<script>

/* ================= TAB ================= */
function switchTab(id,el){
dropdown.classList.add("hidden")
document.getElementById("mask").classList.add("hidden")
document.getElementById("mut").classList.add("hidden")
document.getElementById(id).classList.remove("hidden")
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))
el.classList.add("active")
}

/* ================= MASK ================= */
maskInput.oninput=e=>{
let seq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
maskGrid.innerHTML=""
seq.split("").forEach((a,i)=>{
let d=document.createElement("div")
d.className="box border"
d.innerHTML=`<div>${i+1}</div><b>${a}</b>`
maskGrid.appendChild(d)
})
}

/* ================= MUT ================= */

const AA_INFO={
A:{name:"Alanine",codons:["GCT","GCC","GCA","GCG"]},
L:{name:"Leucine",codons:["TTA","TTG","CTT","CTC","CTA","CTG"]},
K:{name:"Lysine",codons:["AAA","AAG"]},
M:{name:"Methionine",codons:["ATG"]}
}

const CODON_TO_AA={}
Object.entries(AA_INFO).forEach(([aa,o])=>{
o.codons.forEach(c=>CODON_TO_AA[c]=aa)
})

const CODON_USAGE={
ecoli:{GCT:0.16,GCC:0.27,AAA:0.76,CTG:0.49},
pichia:{GCT:0.45,GCC:0.26,AAA:0.47},
coryne:{GCT:0.40,GCC:0.30},
bacillus:{GCT:0.50,GCC:0.30}
}

const organisms=["ecoli","pichia","coryne","bacillus"]
let org="ecoli"

organisms.forEach(o=>{
let b=document.createElement("div")
b.className="org"+(o==="ecoli"?" active":"")
b.innerText=o
b.onclick=()=>{
org=o
document.querySelectorAll('.org').forEach(x=>x.classList.remove('active'))
b.classList.add('active')
render()
}
orgButtons.appendChild(b)
})

let codons=[],orig=[],mut=[]

dnaInput.oninput=()=>{
let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")
codons=[];orig=[];mut=[]
for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){
codons.push(c)
orig.push(CODON_TO_AA[c]||"X")
}
}
render()
}

function render(){
viewer.innerHTML=""
let usage=CODON_USAGE[org]||{}

codons.forEach((c,i)=>{
let aa=CODON_TO_AA[c]||"X"
let freq=usage[c]

let d=document.createElement("div")
d.className="box border cursor-pointer"

if(freq !== undefined && freq < 0.1){
d.classList.add("bg-red-200")
}

if(mut.some(m=>m.pos===i)){
d.classList.add("bg-yellow-200")
}

d.innerHTML=`<div>${i+1}</div><b>${aa}</b><div>${c}</div>`
d.onclick=e=>{e.stopPropagation();openDD(e,i,d)}

viewer.appendChild(d)
})

outputDNA.value=codons.join("")
mutSummary.innerHTML=mut.map(m=>`<div class="bg-indigo-100 px-2 text-xs rounded">${m.from}${m.pos+1}${m.to}</div>`).join("")
}

/* dropdown FIX */
function openDD(e,i,box){

dropdown.innerHTML=""
dropdown.classList.remove("hidden")

Object.entries(AA_INFO).forEach(([aa,o])=>{
let g=document.createElement("div")

g.innerHTML=`<div class="font-semibold text-xs mb-1">${o.name} (${aa})</div>`

o.codons.forEach(c=>{
let row=document.createElement("div")
row.className="cursor-pointer hover:bg-slate-100 px-2 py-1"
row.innerText=c

row.onclick=()=>{
apply(i,c)
dropdown.classList.add("hidden")
}

g.appendChild(row)
})

dropdown.appendChild(g)
})

let r=box.getBoundingClientRect()

let top=r.top + window.scrollY
let left=r.right + 8

// flip if overflow bottom
if(top + 300 > window.innerHeight + window.scrollY){
top = r.bottom + window.scrollY - 300
}

if(left + 220 > window.innerWidth){
left = r.left - 220
}

dropdown.style.top=top+"px"
dropdown.style.left=left+"px"
}

function apply(i,c){
mut=mut.filter(m=>m.pos!==i)

let old=orig[i]
let nw=CODON_TO_AA[c]

if(old!==nw){
mut.push({pos:i,from:old,to:nw})
}

codons[i]=c
render()
}

document.addEventListener("click",()=>dropdown.classList.add("hidden"))

</script>

</body>
</html>
