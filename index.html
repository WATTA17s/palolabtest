<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.nav-btn{padding:8px 14px;border-radius:10px;background:white;cursor:pointer}
.nav-btn.active{background:#4f46e5;color:white}
.box{width:42px;height:60px}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<!-- NAV -->
<div class="flex gap-2 mb-6">
  <button class="nav-btn active" onclick="switchPage(event,'align')">Alignment</button>
  <button class="nav-btn" onclick="switchPage(event,'mask')">Masking</button>
  <button class="nav-btn" onclick="switchPage(event,'mut')">Mutagenesis</button>
</div>

<div class="bg-white p-6 rounded-xl shadow">

<!-- ================= ALIGN ================= -->
<div id="align">

<textarea id="alignInput"
class="w-full p-3 border rounded font-mono mb-4"
placeholder=">ref
MKTALVAG
>mut1
MKTAIVAG"></textarea>

<button onclick="runAlign()" class="bg-indigo-600 text-white px-4 py-2 rounded">
Align
</button>

<div id="alignOut" class="mt-4 font-mono text-sm space-y-3"></div>

</div>

<!-- ================= MASK ================= -->
<div id="mask" class="hidden">

<input id="maskInput"
class="w-full p-3 border rounded font-mono mb-4 text-center"
placeholder="Protein sequence">

<!-- TOGGLE -->
<div class="flex justify-center gap-3 mb-3">
  <span>Sliding</span>
  <div id="toggle" class="w-10 h-5 bg-slate-300 rounded-full cursor-pointer relative">
    <div id="dot" class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 transition"></div>
  </div>
</div>

<div class="flex justify-center gap-2 mb-4">
  <input id="win" type="number" value="5" class="w-16 border text-center rounded">
  <input id="step" type="number" value="1" class="w-16 border text-center rounded">
  <button id="genBtn" class="bg-indigo-600 text-white px-4 rounded">Generate</button>
</div>

<!-- GRID -->
<div id="grid" class="flex flex-wrap gap-2 justify-center mb-4"></div>

<!-- LIBRARY -->
<div class="bg-slate-100 p-3 rounded">
  <div class="flex justify-between mb-2">
    <span class="text-xs">Library</span>
    <button id="copyAll" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs">Copy All</button>
  </div>
  <div id="list" class="space-y-2 max-h-48 overflow-y-auto"></div>
</div>

</div>

<!-- ================= MUT ================= -->
<div id="mut" class="hidden">

<select id="organism" class="border p-2 rounded mb-3">
<option value="ecoli">E. coli</option>
<option value="yeast">Yeast</option>
<option value="pichia">Pichia</option>
</select>

<textarea id="dnaInput"
class="w-full p-3 border rounded font-mono mb-3"
placeholder="ATGGCC..."></textarea>

<button onclick="loadDNA()" class="bg-indigo-600 text-white px-4 py-2 rounded">
Load
</button>

<div id="viewer" class="mt-4 flex flex-wrap gap-2"></div>

<div class="mt-4 text-sm" id="mutSummary"></div>

<textarea id="outputDNA"
class="w-full p-3 border rounded font-mono mt-3"></textarea>

</div>

</div>
</div>

<script>

/* NAV */
function switchPage(e,id){
  document.querySelectorAll("#align,#mask,#mut").forEach(x=>x.classList.add("hidden"))
  document.getElementById(id).classList.remove("hidden")
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"))
  e.target.classList.add("active")
}

/* ================= ALIGN ================= */

function parseFASTA(text){
  return text.trim().split(">").filter(x=>x).map(b=>{
    let l=b.split("\n")
    return {name:l[0], seq:l.slice(1).join("").toUpperCase()}
  })
}

function score(a,b){
  if(a==="-"||b==="-") return -4
  return a===b?2:-1
}

function alignPair(s1,s2){
  let gap=-4
  let m=s1.length,n=s2.length
  let dp=Array.from({length:m+1},()=>Array(n+1).fill(0))

  for(let i=0;i<=m;i++) dp[i][0]=i*gap
  for(let j=0;j<=n;j++) dp[0][j]=j*gap

  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j]=Math.max(
        dp[i-1][j-1]+score(s1[i-1],s2[j-1]),
        dp[i-1][j]+gap,
        dp[i][j-1]+gap
      )
    }
  }

  let a1="",a2="",i=m,j=n

  while(i>0||j>0){
    if(i>0&&j>0 && dp[i][j]===dp[i-1][j-1]+score(s1[i-1],s2[j-1])){
      a1=s1[i-1]+a1; a2=s2[j-1]+a2; i--;j--
    }
    else if(i>0 && dp[i][j]===dp[i-1][j]+gap){
      a1=s1[i-1]+a1; a2="-"+a2; i--
    }
    else{
      a1="-"+a1; a2=s2[j-1]+a2; j--
    }
  }

  return [a1,a2]
}

function runAlign(){
  let data=parseFASTA(alignInput.value)
  if(data.length<2)return

  let aligned=[data[0].seq]

  for(let k=1;k<data.length;k++){
    let seq=data[k].seq
    let [newRef,newSeq]=alignPair(aligned[0],seq)

    aligned=aligned.map(old=>{
      let res="",idx=0
      for(let i=0;i<newRef.length;i++){
        if(newRef[i]==="-") res+="-"
        else res+=old[idx++]||"-"
      }
      return res
    })

    aligned[0]=newRef
    aligned.push(newSeq)
  }

  alignOut.innerHTML=aligned.map((s,i)=>`
    <div>
      <div class="text-xs">${data[i].name}</div>
      <div>${s}</div>
    </div>
  `).join("")
}

/* ================= MASK ================= */

let state={
  sequence:"",
  manualMask:new Set(),
  library:[],
  sliding:false
}

maskInput.oninput=e=>{
  let seq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
  maskInput.value=seq
  state.sequence=seq
  state.manualMask.clear()
  renderGrid()
}

toggle.onclick=()=>{
  state.sliding=!state.sliding
  toggle.classList.toggle("bg-indigo-600",state.sliding)
  dot.style.transform = state.sliding ? "translateX(20px)" : "translateX(0px)"
}

function renderGrid(){
  grid.innerHTML=""

  state.sequence.split("").forEach((aa,i)=>{
    let d=document.createElement("div")
    d.className="box border rounded text-center cursor-pointer flex flex-col justify-center"

    if(state.manualMask.has(i)) d.classList.add("bg-red-500","text-white")

    d.innerHTML=`${aa}<div class="text-xs">${i+1}</div>`

    d.onclick=()=>{
      state.manualMask.has(i)?state.manualMask.delete(i):state.manualMask.add(i)
      renderGrid()
    }

    grid.appendChild(d)
  })
}

genBtn.onclick=()=>{
  if(!state.sequence)return

  let newSeqs=[]

  if(state.manualMask.size){
    let arr=[...state.sequence]
    state.manualMask.forEach(i=>arr[i]="_")
    newSeqs.push(arr.join(""))
  }

  if(state.sliding){
    let w=+win.value
    let s=+step.value

    for(let i=0;i<=state.sequence.length-w;i+=s){
      let arr=[...state.sequence]
      for(let j=0;j<w;j++) arr[i+j]="_"
      newSeqs.push(arr.join(""))
    }
  }

  newSeqs.forEach(seq=>{
    if(!state.library.includes(seq)) state.library.push(seq)
  })

  renderList()
}

function copy(btn,text){
  navigator.clipboard.writeText(text)
  let t=btn.innerText
  btn.innerText="✓"
  btn.classList.add("text-green-600")
  setTimeout(()=>{
    btn.innerText=t
    btn.classList.remove("text-green-600")
  },800)
}

function renderList(){
  list.innerHTML=""

  state.library.forEach(seq=>{
    let row=document.createElement("div")
    row.className="flex justify-between bg-white p-2 rounded items-center"

    let txt=document.createElement("span")
    txt.className="font-mono text-xs"
    txt.innerText=seq

    let actions=document.createElement("div")
    actions.className="flex gap-3"

    let c=document.createElement("button")
    c.innerText="Copy"
    c.className="text-xs bg-slate-200 px-2 rounded"
    c.onclick=()=>copy(c,seq)

    let d=document.createElement("button")
    d.innerText="✕"
    d.onclick=()=>{
      state.library=state.library.filter(x=>x!==seq)
      renderList()
    }

    actions.append(c,d)
    row.append(txt,actions)
    list.appendChild(row)
  })
}

copyAll.onclick=(e)=>{
  copy(e.target, state.library.join("\n"))
}

/* ================= MUT ================= */

const CODON={
  ecoli:{K:"AAA",L:"CTG",A:"GCG",M:"ATG"},
  yeast:{K:"AAA",L:"TTG",A:"GCT",M:"ATG"},
  pichia:{K:"AAG",L:"TTG",A:"GCT",M:"ATG"}
}

const AA_TABLE={
  ATG:"M",AAA:"K",AAG:"K",GCT:"A",GCG:"A",TTG:"L",CTG:"L"
}

let codons=[]
let mutations=[]

function loadDNA(){
  let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")
  codons=[]
  mutations=[]

  for(let i=0;i<dna.length;i+=3){
    codons.push(dna.slice(i,i+3))
  }

  renderMut()
}

function renderMut(){

  viewer.innerHTML=""

  codons.forEach((c,i)=>{
    let aa=AA_TABLE[c]||"X"

    let d=document.createElement("div")
    d.className="box border rounded text-center cursor-pointer flex flex-col justify-center"

    d.innerHTML=`${i+1}<br>${c}<br><b>${aa}</b>`

    d.onclick=()=>{
      let newAA=prompt("Mutate to:")
      if(!newAA)return

      newAA=newAA.toUpperCase()

      let newCod=CODON[organism.value][newAA]
      if(!newCod)return alert("No codon")

      mutations.push(`${aa}${i+1}${newAA}`)
      codons[i]=newCod

      renderMut()
    }

    viewer.appendChild(d)
  })

  outputDNA.value=codons.join("")
  mutSummary.innerText=mutations.join(" ")
}

</script>

</body>
</html>
