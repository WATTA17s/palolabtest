<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }

.nav-btn {
  padding:8px 14px;
  border-radius:10px;
  background:white;
  cursor:pointer;
  transition:0.2s;
}
.nav-btn:hover { background:#f1f5f9; }
.nav-btn.active { background:#4f46e5; color:white; }

.toggle {
  width:40px;height:20px;background:#e2e8f0;border-radius:999px;cursor:pointer;position:relative;
}
.toggle::after {
  content:"";width:16px;height:16px;background:white;position:absolute;top:2px;left:2px;border-radius:50%;
  transition:0.2s;
}
.toggle.active { background:#4f46e5; }
.toggle.active::after { transform:translateX(20px); }

.btn {
  transition: all 0.15s ease;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: scale(0.97); }

.copy-success { color:#22c55e; }
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-5xl mx-auto">

<h1 class="text-3xl mb-6 font-semibold">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-6">
  <button data-page="mask" class="nav-btn active">Masking</button>
</div>

<div class="bg-white p-6 rounded-xl shadow-sm">

<!-- INPUT -->
<input id="seqInput"
class="w-full p-3 border rounded font-mono text-center mb-4"
placeholder="Paste protein sequence">

<!-- TOGGLE -->
<div class="flex justify-center gap-3 mb-4">
  <span class="text-sm">Sliding</span>
  <div id="toggle" class="toggle"></div>
</div>

<!-- CONTROL -->
<div class="flex justify-center gap-2 mb-4">
  <input id="win" type="number" value="5" class="w-16 border text-center rounded">
  <input id="step" type="number" value="1" class="w-16 border text-center rounded">
  <button id="genBtn" class="btn bg-indigo-600 text-white px-4 rounded">Generate</button>
  <button id="clearBtn" class="btn bg-slate-200 px-4 rounded">Clear</button>
</div>

<!-- GRID -->
<div id="grid" class="flex flex-wrap gap-2 justify-center mb-4"></div>

<!-- SUMMARY -->
<div class="text-center text-xs text-slate-500 mb-4" id="summary">
  No mask selected
</div>

<!-- LIBRARY -->
<div class="bg-slate-100 p-3 rounded">
  <div class="flex justify-between mb-2">
    <span class="text-xs">Library</span>
    <button id="copyAll" class="btn text-xs bg-indigo-600 text-white px-3 py-1 rounded">Copy All</button>
  </div>
  <div id="list" class="space-y-2 max-h-48 overflow-y-auto"></div>
</div>

</div>
</div>

<script>

/* VALID AA */
const AA_SET = new Set([
"A","R","N","D","C","Q","E","G",
"H","I","L","K","M","F","P","S",
"T","W","Y","V"
])

/* STATE */
let state = {
  sequence:"",
  manualMask:new Set(),
  library:[],
  useSliding:false
}

/* INPUT FILTER */
seqInput.oninput = e => {

  let raw = e.target.value.toUpperCase()
  let filtered = ""

  for(let c of raw){
    if(AA_SET.has(c)) filtered += c
  }

  e.target.value = filtered
  state.sequence = filtered

  state.manualMask.clear()
  renderGrid()
}

/* TOGGLE */
toggle.onclick = ()=>{
  state.useSliding = !state.useSliding
  toggle.classList.toggle("active", state.useSliding)
}

/* GRID */
function renderGrid(){

  grid.innerHTML=""

  state.sequence.split("").forEach((aa,i)=>{

    let box = document.createElement("div")
    box.className="w-10 h-12 border rounded flex flex-col items-center justify-center cursor-pointer"

    box.innerHTML=`${aa}<div style="font-size:10px">${i+1}</div>`

    if(state.manualMask.has(i)){
      box.classList.add("bg-red-500","text-white")
    }

    box.onclick=()=>{
      if(state.manualMask.has(i)) state.manualMask.delete(i)
      else state.manualMask.add(i)

      renderGrid()
      updateSummary()
    }

    grid.appendChild(box)
  })
}

/* SUMMARY */
function updateSummary(){
  if(state.manualMask.size === 0){
    summary.innerText = "No mask selected"
  } else {
    let arr = [...state.manualMask].map(i=>i+1)
    summary.innerText = "Masked positions: " + arr.join(", ")
  }
}

/* CLEAR */
clearBtn.onclick = ()=>{
  state.manualMask.clear()
  renderGrid()
  updateSummary()
}

/* GENERATE */
genBtn.onclick = ()=>{

  if(!state.sequence) return

  let newSeqs=[]

  if(state.manualMask.size){
    let arr=[...state.sequence]
    state.manualMask.forEach(i=>arr[i]="_")
    newSeqs.push(arr.join(""))
  }

  if(state.useSliding){
    let w=Math.max(1,+win.value)
    let s=Math.max(1,+step.value)

    for(let i=0;i<=state.sequence.length-w;i+=s){
      let arr=[...state.sequence]
      for(let j=0;j<w;j++) arr[i+j]="_"
      newSeqs.push(arr.join(""))
    }
  }

  newSeqs.forEach(s=>{
    if(!state.library.includes(s)) state.library.push(s)
  })

  renderList()
}

/* COPY */
function copy(btn,text){
  navigator.clipboard.writeText(text)
  let t = btn.innerText
  btn.innerText="✓"
  btn.classList.add("copy-success")
  setTimeout(()=>{
    btn.innerText=t
    btn.classList.remove("copy-success")
  },800)
}

/* LIST */
function renderList(){

  list.innerHTML=""

  state.library.forEach(seq=>{

    let row=document.createElement("div")
    row.className="flex justify-between bg-white p-2 rounded items-center"

    let txt=document.createElement("span")
    txt.className="font-mono text-xs"
    txt.innerText=seq

    let actions=document.createElement("div")

    let copyBtn=document.createElement("button")
    copyBtn.innerText="Copy"
    copyBtn.className="btn text-xs bg-slate-100 px-2 rounded"
    copyBtn.onclick=()=>copy(copyBtn,seq)

    let del=document.createElement("button")
    del.innerText="✕"
    del.onclick=()=>{
      state.library=state.library.filter(x=>x!==seq)
      renderList()
    }

    actions.append(copyBtn,del)
    row.append(txt,actions)

    list.appendChild(row)
  })
}

/* COPY ALL */
copyAll.onclick = ()=>{
  navigator.clipboard.writeText(state.library.join("\n"))
}

</script>

</body>
</html>
