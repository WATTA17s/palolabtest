<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pa1oLAB v2</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.glass { backdrop-filter: blur(12px); }
.nav-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  transition: 0.2s;
}
.nav-btn.active {
  background: #4f46e5;
  color: white;
}
.copy-success {
  background: #22c55e !important;
  color: white !important;
}
</style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">

<div class="max-w-6xl mx-auto p-8">

<h1 class="text-2xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<div class="glass bg-white/70 rounded-2xl shadow-xl p-6">

<h2 class="text-lg font-semibold mb-4 text-center">🎭 Masking Engine</h2>

<input id="maskInput"
  class="w-full max-w-xl mx-auto block p-3 border rounded-xl font-mono text-sm mb-6 text-center"
  placeholder="Paste protein sequence...">

<!-- MODE -->
<div class="flex justify-center gap-3 mb-3">
  <button id="btnManual" onclick="setMode('manual')" class="nav-btn active">Manual</button>
  <button id="btnSlide" onclick="setMode('slide')" class="nav-btn">Sliding</button>
</div>

<p id="modeLabel" class="text-center text-xs text-slate-500 mb-6">
  Current Mode: Manual
</p>

<!-- CONTROL -->
<div class="flex justify-center items-center gap-4 mb-6 text-sm">
  <div class="flex items-center gap-1">
    <span class="text-xs">Window</span>
    <input id="winVal" type="number" value="5" class="w-16 p-1 border rounded text-center">
  </div>

  <div class="flex items-center gap-1">
    <span class="text-xs">Step</span>
    <input id="stepVal" type="number" value="1" class="w-16 p-1 border rounded text-center">
  </div>

  <button onclick="generateAll()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl">
    Generate
  </button>
</div>

<!-- GRID -->
<div id="grid" class="flex flex-wrap gap-2 justify-center mb-6"></div>

<!-- OUTPUT -->
<div class="bg-slate-100 p-4 rounded-xl">

  <div class="flex justify-between mb-2">
    <span class="text-xs text-slate-500">Library Output (All)</span>
    <button onclick="copyAll(this)" class="text-xs bg-indigo-600 text-white px-3 py-1 rounded">
      Copy All
    </button>
  </div>

  <div id="libList" class="space-y-2 max-h-56 overflow-y-auto"></div>

</div>

</div>
</div>

<script>

let mode = "manual"
let sequence = ""
let manualMask = []

let combinedLib = new Set()

function setMode(m){
  mode = m
  document.getElementById("modeLabel").innerText =
    "Current Mode: " + (m==="manual"?"Manual":"Sliding")

  document.getElementById("btnManual").classList.remove("active")
  document.getElementById("btnSlide").classList.remove("active")

  if(m==="manual") document.getElementById("btnManual").classList.add("active")
  else document.getElementById("btnSlide").classList.add("active")
}

document.getElementById("maskInput").addEventListener("input", e=>{
  sequence = e.target.value.toUpperCase()
  renderGrid()
})

function renderGrid(){
  const grid = document.getElementById("grid")
  grid.innerHTML = ""
  manualMask = []

  sequence.split("").forEach((aa,i)=>{
    const box = document.createElement("div")
    box.className = "w-12 h-14 rounded-xl border flex flex-col items-center justify-center text-sm cursor-pointer"

    box.innerHTML = `<b>${aa}</b><span class="text-[10px]">${i+1}</span>`

    box.onclick = ()=>{
      if(mode !== "manual") return

      if(manualMask.includes(i)){
        manualMask = manualMask.filter(x=>x!==i)
        box.classList.remove("bg-red-400","text-white")
      } else {
        manualMask.push(i)
        box.classList.add("bg-red-400","text-white")
      }
    }

    grid.appendChild(box)
  })
}

function generateAll(){

  // Manual
  if(manualMask.length > 0){
    let arr = sequence.split("")
    manualMask.forEach(i=> arr[i]="_")
    combinedLib.add(arr.join(""))
  }

  // Sliding
  let w = parseInt(document.getElementById("winVal").value)
  let s = parseInt(document.getElementById("stepVal").value)

  for(let i=0;i<=sequence.length-w;i+=s){
    let arr = sequence.split("")
    for(let j=0;j<w;j++){
      arr[i+j]="_"
    }
    combinedLib.add(arr.join(""))
  }

  renderList()
}

function renderList(){
  const container = document.getElementById("libList")
  container.innerHTML = ""

  combinedLib.forEach(seq=>{
    const row = document.createElement("div")
    row.className = "flex justify-between items-center bg-white p-2 rounded border"

    row.innerHTML = `
      <span class="font-mono text-xs truncate">${seq}</span>
      <button onclick="copyOne(this,'${seq}')" class="text-xs bg-slate-200 px-2 py-1 rounded">
        Copy
      </button>
    `
    container.appendChild(row)
  })
}

function copyAll(btn){
  navigator.clipboard.writeText(Array.from(combinedLib).join("\\n"))
  animate(btn)
}

function copyOne(btn,seq){
  navigator.clipboard.writeText(seq)
  animate(btn)
}

function animate(btn){
  btn.classList.add("copy-success")
  btn.innerText = "Copied ✓"
  setTimeout(()=>{
    btn.classList.remove("copy-success")
    btn.innerText = "Copy"
  },1000)
}

</script>

</body>
</html>
