<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.nav-btn{padding:8px 14px;border-radius:10px;background:white;cursor:pointer}
.nav-btn.active{background:#4f46e5;color:white}

.box{
  width:64px;height:78px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:12px;
}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-6">
<button class="nav-btn active" onclick="switchPage(event,'align')">Alignment</button>
<button class="nav-btn" onclick="switchPage(event,'mask')">Masking</button>
<button class="nav-btn" onclick="switchPage(event,'mut')">Mutagenesis</button>
</div>

<div class="bg-white p-6 rounded-xl shadow">

<!-- ================= ALIGN ================= -->
<div id="align">
<textarea id="alignInput" class="w-full p-3 border rounded font-mono mb-4"></textarea>
<button onclick="runAlign()" class="bg-indigo-600 text-white px-4 py-2 rounded">Align</button>
<div id="alignOut" class="mt-4 font-mono text-sm"></div>
</div>

<!-- ================= MASK ================= -->
<div id="mask" class="hidden">

<input id="maskInput" class="w-full p-3 border rounded font-mono mb-4 text-center" placeholder="Protein sequence">

<div class="flex justify-center gap-3 mb-3">
<span>Sliding</span>
<div id="toggle" class="w-10 h-5 bg-slate-300 rounded-full cursor-pointer relative">
<div id="dot" class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 transition"></div>
</div>
</div>

<div class="flex justify-center gap-2 mb-4">
<input id="win" type="number" value="5" class="w-16 border text-center rounded">
<input id="step" type="number" value="1" class="w-16 border text-center rounded">
<button id="genBtn" class="bg-indigo-600 text-white px-4 rounded">Generate</button>
</div>

<div id="grid" class="flex flex-wrap gap-2 justify-center"></div>

</div>

<!-- ================= MUT ================= -->
<div id="mut" class="hidden relative">

<textarea id="dnaInput" class="w-full p-3 border rounded font-mono mb-3" placeholder="DNA sequence"></textarea>

<button id="loadBtn" class="bg-indigo-600 text-white px-4 py-2 rounded">Load</button>

<div id="viewer" class="mt-4 flex flex-wrap gap-3 justify-center"></div>

<div id="dropdown" class="absolute hidden bg-white border rounded-xl shadow-lg p-3 text-sm z-[9999] max-h-96 overflow-y-auto"></div>

<!-- OUTPUT -->
<div class="mt-6">

<div class="text-sm mb-1 text-slate-500">Mutations</div>
<div id="mutSummary" class="flex flex-wrap gap-2 mb-3"></div>

<div class="text-sm mb-1 text-slate-500">DNA Output</div>
<textarea id="outputDNA" class="w-full p-3 border rounded font-mono bg-slate-50"></textarea>

<button onclick="copyDNA()" class="mt-2 bg-green-600 text-white px-3 py-1 rounded">
Copy DNA
</button>

</div>

</div>

</div>
</div>

<script>

/* NAV */
function switchPage(e,id){
document.querySelectorAll("#align,#mask,#mut").forEach(x=>x.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")
document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")
}

/* ================= MASK ================= */
let state={sequence:"",mask:new Set(),sliding:false}

maskInput.oninput=e=>{
state.sequence=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
renderMask()
}

toggle.onclick=()=>{
state.sliding=!state.sliding
toggle.classList.toggle("bg-indigo-600",state.sliding)
dot.style.transform=state.sliding?"translateX(20px)":"translateX(0)"
}

function renderMask(){
grid.innerHTML=""
state.sequence.split("").forEach((aa,i)=>{
let d=document.createElement("div")
d.className="box border cursor-pointer"
if(state.mask.has(i))d.classList.add("bg-red-500","text-white")

d.innerHTML=`
<div class="text-xs">${i+1}</div>
<div class="text-lg">${aa}</div>
`

d.onclick=()=>{
state.mask.has(i)?state.mask.delete(i):state.mask.add(i)
renderMask()
}

grid.appendChild(d)
})
}

/* ================= MUT ================= */

const CODON_TABLE_FULL = {
A:["GCT","GCC","GCA","GCG"],
K:["AAA","AAG"],
L:["TTA","TTG","CTG"],
M:["ATG"],
F:["TTT","TTC"]
}

const CODON_USAGE={
GCT:0.16,GCC:0.27,GCA:0.22,GCG:0.35,
AAA:0.76,AAG:0.24,
TTT:0.58,TTC:0.42,
CTG:0.49
}

const CODON_TO_AA={}
for(let aa in CODON_TABLE_FULL){
CODON_TABLE_FULL[aa].forEach(c=>CODON_TO_AA[c]=aa)
}

let codons=[], originalAA=[], mutations=[]

document.getElementById("loadBtn").addEventListener("click",loadDNA)

function loadDNA(){
let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")

codons=[];originalAA=[];mutations=[]

for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){
codons.push(c)
originalAA.push(CODON_TO_AA[c]||"X")
}
}

renderMut()
}

function renderMut(){
viewer.innerHTML=""

codons.forEach((c,i)=>{
let aa=CODON_TO_AA[c]||"X"

let d=document.createElement("div")
d.className="box border bg-white hover:bg-slate-100 cursor-pointer"

d.innerHTML=`
<div class="text-xs">${i+1}</div>
<div class="text-lg font-bold">${aa}</div>
<div class="text-xs font-mono">${c}</div>
`

d.onclick=(e)=>{
e.stopPropagation()
openDropdown(e,i)
}

viewer.appendChild(d)
})

updateOutput()
}

/* NEW DROPDOWN */
function openDropdown(e,i){

dropdown.innerHTML=""

Object.keys(CODON_TABLE_FULL).forEach(aa=>{

let group=document.createElement("div")
group.className="mb-2"

group.innerHTML=`<div class="font-bold text-slate-600">${aa}</div>`

let list=[...CODON_TABLE_FULL[aa]]
list.sort((a,b)=>(CODON_USAGE[b]||0)-(CODON_USAGE[a]||0))

list.forEach((c,idx)=>{

let freq=CODON_USAGE[c]||0

let row=document.createElement("div")
row.className="flex justify-between px-2 py-1 rounded cursor-pointer hover:bg-slate-100"

if(idx===0) row.classList.add("bg-green-100")

row.innerHTML=`
<span>${c}</span>
<span class="text-xs text-slate-500">${freq.toFixed(2)}</span>
`

row.onclick=()=>{
applyMutation(i,c)
dropdown.classList.add("hidden")
}

group.appendChild(row)
})

dropdown.appendChild(group)

})

dropdown.style.left=e.pageX+"px"
dropdown.style.top=e.pageY+"px"
dropdown.classList.remove("hidden")
}

function applyMutation(i,newCodon){
let oldAA=originalAA[i]
let newAA=CODON_TO_AA[newCodon]

if(oldAA!==newAA){
let mut=`${oldAA}${i+1}${newAA}`
if(!mutations.includes(mut))mutations.push(mut)
}

codons[i]=newCodon
renderMut()
}

function updateOutput(){
outputDNA.value=codons.join("")

mutSummary.innerHTML=""
mutations.forEach(m=>{
let tag=document.createElement("div")
tag.className="px-2 py-1 bg-indigo-100 rounded text-xs"
tag.innerText=m
mutSummary.appendChild(tag)
})
}

function copyDNA(){
navigator.clipboard.writeText(outputDNA.value)
}

document.addEventListener("click",(e)=>{
if(!e.target.closest("#dropdown") && !e.target.closest("#viewer")){
dropdown.classList.add("hidden")
}
})

</script>

</body>
</html>
