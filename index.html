<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }

.nav-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: white;
  cursor: pointer;
}
.nav-btn.active { background:#4f46e5; color:white; }

.toggle {
  width:40px;height:20px;background:#ccc;border-radius:999px;cursor:pointer;position:relative;
}
.toggle::after {
  content:"";width:16px;height:16px;background:white;position:absolute;top:2px;left:2px;border-radius:50%;
  transition:0.2s;
}
.toggle.active { background:#4f46e5; }
.toggle.active::after { transform:translateX(20px); }
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl mb-6">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-6">
  <button data-page="align" class="nav-btn active">Alignment</button>
  <button data-page="mask" class="nav-btn">Masking</button>
</div>

<div class="bg-white p-6 rounded shadow">

<!-- ALIGN -->
<div id="align" class="view">

<textarea id="alignInput" class="w-full p-2 border rounded font-mono mb-3"
placeholder=">ref
MKTALVAG
>mut1
MKTAIVAG"></textarea>

<button onclick="runAlign()" class="bg-indigo-600 text-white px-3 py-1 rounded mb-3">
Align
</button>

<div id="alignOutput" class="font-mono text-sm space-y-3"></div>

<div class="mt-4">
  <h3 class="text-sm font-semibold">Mutation Summary</h3>
  <div id="mutationBox" class="text-xs font-mono"></div>
</div>

</div>

<!-- MASK -->
<div id="mask" class="view hidden">

<input id="seqInput" class="w-full p-2 border rounded font-mono text-center mb-3">

<div class="flex justify-center gap-3 mb-3">
  <span>Sliding</span>
  <div id="toggle" class="toggle active"></div>
</div>

<div class="flex justify-center gap-2 mb-3">
  <input id="win" type="number" value="5" class="w-16 border text-center">
  <input id="step" type="number" value="1" class="w-16 border text-center">
  <button id="genBtn" class="bg-indigo-600 text-white px-3 rounded">Generate</button>
</div>

<div id="grid" class="flex flex-wrap gap-2 justify-center mb-4"></div>

<div id="list" class="space-y-2"></div>

</div>

</div>
</div>

<script>

/* NAV */
document.querySelectorAll("[data-page]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-page]").forEach(b=>b.classList.remove("active"))
    btn.classList.add("active")

    document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"))
    document.getElementById(btn.dataset.page).classList.remove("hidden")
  }
})

/* FASTA */
function parseFASTA(text){
  return text.trim().split(">")
  .filter(x=>x)
  .map(b=>{
    const l=b.split("\n")
    return {name:l[0], seq:l.slice(1).join("").replace(/\s/g,"").toUpperCase()}
  })
}

/* BLOSUM (simplified) */
function score(a,b){
  if(a==="-"||b==="-") return -4
  return a===b ? 2 : -1
}

/* ALIGN */
function alignPair(s1,s2){
  const gap=-4
  let m=s1.length,n=s2.length
  let dp=Array.from({length:m+1},()=>Array(n+1).fill(0))

  for(let i=0;i<=m;i++) dp[i][0]=i*gap
  for(let j=0;j<=n;j++) dp[0][j]=j*gap

  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j]=Math.max(
        dp[i-1][j-1]+score(s1[i-1],s2[j-1]),
        dp[i-1][j]+gap,
        dp[i][j-1]+gap
      )
    }
  }

  let a1="",a2="",i=m,j=n

  while(i>0||j>0){
    if(i>0&&j>0 && dp[i][j]===dp[i-1][j-1]+score(s1[i-1],s2[j-1])){
      a1=s1[i-1]+a1; a2=s2[j-1]+a2; i--;j--
    }
    else if(i>0 && dp[i][j]===dp[i-1][j]+gap){
      a1=s1[i-1]+a1; a2="-"+a2; i--
    }
    else{
      a1="-"+a1; a2=s2[j-1]+a2; j--
    }
  }

  return [a1,a2]
}

/* COLOR */
function aaColor(a){
  if("AVLIMFWY".includes(a)) return "bg-yellow-200"
  if("KRH".includes(a)) return "bg-blue-200"
  if("DE".includes(a)) return "bg-red-200"
  if("STNQ".includes(a)) return "bg-green-200"
  return ""
}

/* RUN ALIGN */
function runAlign(){
  const data=parseFASTA(document.getElementById("alignInput").value)
  if(data.length<2) return

  let ref=data[0]
  let aligned=[ref.seq]

  data.slice(1).forEach(d=>{
    let [r,o]=alignPair(ref.seq,d.seq)
    aligned[0]=r
    aligned.push(o)
  })

  renderAlignment(data.map(d=>d.name),aligned)
}

/* RENDER */
function renderAlignment(names,seqs){

  const out=document.getElementById("alignOutput")
  const mutBox=document.getElementById("mutationBox")

  out.innerHTML=""
  mutBox.innerHTML=""

  let len=seqs[0].length

  let freq=Array(len).fill(0)
  for(let i=0;i<len;i++){
    seqs.slice(1).forEach(s=>{
      if(s[i]!==seqs[0][i]) freq[i]++
    })
  }

  seqs.forEach((seq,idx)=>{
    let html=""

    for(let i=0;i<len;i++){
      let heat=freq[i]?`bg-red-${Math.min(900,100+freq[i]*200)}`:""
      let mut=(idx!==0 && seq[i]!==seqs[0][i])?"ring-2 ring-red-500":""

      html+=`
      <span onclick="jumpToMask(${i})"
      class="inline-block w-6 text-center cursor-pointer ${aaColor(seq[i])} ${mut} ${heat}">
      ${seq[i]}</span>`
    }

    let row=document.createElement("div")
    row.innerHTML=`<div class="text-xs">${names[idx]}</div>${html}`
    out.appendChild(row)
  })

  /* mutation summary */
  seqs.slice(1).forEach((seq,idx)=>{
    let muts=[]
    for(let i=0;i<len;i++){
      if(seq[i]!==seqs[0][i]){
        muts.push(`${seqs[0][i]}${i+1}→${seq[i]}`)
      }
    }
    let line=document.createElement("div")
    line.innerText=`${names[idx+1]}: ${muts.join(", ")}`
    mutBox.appendChild(line)
  })
}

/* MASK */
let sequence="",manualMask=new Set(),library=[],useSliding=true

const grid=document.getElementById("grid")
const list=document.getElementById("list")

document.getElementById("toggle").onclick=()=>{
  useSliding=!useSliding
  document.getElementById("toggle").classList.toggle("active",useSliding)
}

document.getElementById("seqInput").oninput=e=>{
  sequence=e.target.value
  manualMask.clear()
  renderGrid()
}

function renderGrid(){
  grid.innerHTML=""
  sequence.split("").forEach((aa,i)=>{
    let box=document.createElement("div")
    box.className="w-10 h-12 border flex flex-col items-center justify-center cursor-pointer"
    box.innerHTML=`${aa}<div style="font-size:10px">${i+1}</div>`

    box.onclick=()=>{
      if(manualMask.has(i)){
        manualMask.delete(i)
        box.classList.remove("bg-red-400")
      }else{
        manualMask.add(i)
        box.classList.add("bg-red-400")
      }
    }

    grid.appendChild(box)
  })
}

document.getElementById("genBtn").onclick=()=>{
  let newSeqs=[]

  if(manualMask.size){
    let arr=[...sequence]
    manualMask.forEach(i=>arr[i]="_")
    newSeqs.push(arr.join(""))
  }

  if(useSliding){
    let w=+document.getElementById("win").value
    let s=+document.getElementById("step").value

    for(let i=0;i<=sequence.length-w;i+=s){
      let arr=[...sequence]
      for(let j=0;j<w;j++) arr[i+j]="_"
      newSeqs.push(arr.join(""))
    }
  }

  newSeqs.forEach(s=>{
    if(!library.includes(s)) library.push(s)
  })

  renderList()
}

function renderList(){
  list.innerHTML=""
  library.forEach(seq=>{
    let row=document.createElement("div")
    row.className="flex justify-between bg-white p-2"
    row.innerHTML=`<span>${seq}</span><button onclick="removeSeq('${seq}')">✕</button>`
    list.appendChild(row)
  })
}

function removeSeq(s){
  library=library.filter(x=>x!==s)
  renderList()
}

/* CLICK */
function jumpToMask(pos){
  document.querySelector('[data-page="mask"]').click()

  let data=parseFASTA(document.getElementById("alignInput").value)
  if(!data.length) return

  sequence=data[0].seq
  document.getElementById("seqInput").value=sequence

  manualMask.clear()
  manualMask.add(pos)

  renderGrid()
}

</script>

</body>
</html>
