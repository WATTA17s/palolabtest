<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.nav{padding:8px 14px;border-radius:10px;background:white;cursor:pointer}
.active{background:#4f46e5;color:white}

.box{
  width:64px;height:84px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:12px;
}

#dropdown{min-width:200px}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-6">
<button class="nav active" onclick="show('mask',this)">Masking</button>
<button class="nav" onclick="show('mut',this)">Mutagenesis</button>
</div>

<div class="bg-white p-6 rounded-xl shadow">

<!-- ================= MASK ================= -->
<div id="mask">

<input id="maskInput" class="w-full p-3 border rounded mb-4 text-center" placeholder="Protein sequence">

<div class="flex gap-2 justify-center mb-3">
<input id="win" value="5" class="w-16 border text-center rounded">
<input id="step" value="1" class="w-16 border text-center rounded">
<button onclick="generateMask()" class="bg-indigo-600 text-white px-3 rounded">Generate</button>
<button onclick="copyAllMask()" class="bg-green-600 text-white px-3 rounded">Copy All</button>
</div>

<div id="maskGrid" class="flex flex-wrap gap-2 justify-center mb-4"></div>
<div id="maskLib" class="text-sm space-y-1"></div>

</div>

<!-- ================= MUT ================= -->
<div id="mut" class="hidden relative">

<select id="organism" class="border p-2 rounded mb-3">
<option value="ecoli">E. coli</option>
<option value="pichia">Pichia</option>
</select>

<textarea id="dnaInput" class="w-full p-3 border rounded font-mono mb-3"></textarea>

<div id="viewer" class="flex flex-wrap gap-3 justify-center"></div>

<div id="dropdown"
class="absolute hidden bg-white border rounded shadow p-3 text-sm z-[9999] max-h-80 overflow-y-auto pointer-events-none"></div>

<div class="mt-4">
<div id="mutSummary" class="flex flex-wrap gap-2"></div>
<textarea id="outputDNA" class="w-full p-2 border rounded font-mono mt-2"></textarea>
<button onclick="copyDNA()" class="mt-2 bg-green-600 text-white px-3 py-1 rounded">Copy DNA</button>
</div>

</div>

</div>
</div>

<script>

/* ================= NAV ================= */
function show(id,btn){
document.getElementById("mask").classList.add("hidden")
document.getElementById("mut").classList.add("hidden")
document.getElementById(id).classList.remove("hidden")
document.querySelectorAll(".nav").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

/* ================= MASK ================= */
let seq="",maskSet=new Set(),library=[]

maskInput.oninput=e=>{
seq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
renderMask()
}

function renderMask(){
maskGrid.innerHTML=""
seq.split("").forEach((a,i)=>{
let d=document.createElement("div")
d.className="box border cursor-pointer"
if(maskSet.has(i)) d.classList.add("bg-red-500","text-white")

d.innerHTML=`<div>${i+1}</div><b>${a}</b>`

d.onclick=()=>{
maskSet.has(i)?maskSet.delete(i):maskSet.add(i)
renderMask()
}

maskGrid.appendChild(d)
})
}

function generateMask(){
let arr=[...seq]
maskSet.forEach(i=>arr[i]="_")
let s=arr.join("")
if(!library.includes(s)) library.push(s)

maskLib.innerHTML=library.map(x=>`<div>${x}</div>`).join("")
}

function copyAllMask(){
navigator.clipboard.writeText(library.join("\n"))
}

/* ================= MUT ================= */

/* FULL AA TABLE */
const AA_INFO={
A:{name:"Alanine",codons:["GCT","GCC","GCA","GCG"]},
R:{name:"Arginine",codons:["CGT","CGC","CGA","CGG","AGA","AGG"]},
N:{name:"Asparagine",codons:["AAT","AAC"]},
D:{name:"Aspartic Acid",codons:["GAT","GAC"]},
C:{name:"Cysteine",codons:["TGT","TGC"]},
Q:{name:"Glutamine",codons:["CAA","CAG"]},
E:{name:"Glutamic Acid",codons:["GAA","GAG"]},
G:{name:"Glycine",codons:["GGT","GGC","GGA","GGG"]},
H:{name:"Histidine",codons:["CAT","CAC"]},
I:{name:"Isoleucine",codons:["ATT","ATC","ATA"]},
L:{name:"Leucine",codons:["TTA","TTG","CTT","CTC","CTA","CTG"]},
K:{name:"Lysine",codons:["AAA","AAG"]},
M:{name:"Methionine",codons:["ATG"]},
F:{name:"Phenylalanine",codons:["TTT","TTC"]},
P:{name:"Proline",codons:["CCT","CCC","CCA","CCG"]},
S:{name:"Serine",codons:["TCT","TCC","TCA","TCG","AGT","AGC"]},
T:{name:"Threonine",codons:["ACT","ACC","ACA","ACG"]},
W:{name:"Tryptophan",codons:["TGG"]},
Y:{name:"Tyrosine",codons:["TAT","TAC"]},
V:{name:"Valine",codons:["GTT","GTC","GTA","GTG"]}
}

/* CODON → AA */
const CODON_TO_AA={}
Object.entries(AA_INFO).forEach(([aa,o])=>{
o.codons.forEach(c=>CODON_TO_AA[c]=aa)
})

/* 🔥 FULL CODON USAGE */
const CODON_USAGE = {
ecoli:{TTT:0.58,TTC:0.42,TTA:0.13,TTG:0.13,CTT:0.11,CTC:0.10,CTA:0.04,CTG:0.49,ATT:0.50,ATC:0.40,ATA:0.09,ATG:1.00,GTT:0.26,GTC:0.21,GTA:0.16,GTG:0.37,TCT:0.14,TCC:0.15,TCA:0.14,TCG:0.15,AGT:0.16,AGC:0.27,CCT:0.17,CCC:0.13,CCA:0.19,CCG:0.51,ACT:0.17,ACC:0.41,ACA:0.15,ACG:0.27,GCT:0.16,GCC:0.27,GCA:0.22,GCG:0.35,TAT:0.57,TAC:0.43,CAT:0.58,CAC:0.42,CAA:0.33,CAG:0.67,AAT:0.47,AAC:0.53,AAA:0.76,AAG:0.24,GAT:0.63,GAC:0.37,GAA:0.68,GAG:0.32,TGT:0.45,TGC:0.55,TGG:1.00,CGT:0.36,CGC:0.37,CGA:0.07,CGG:0.11,AGA:0.05,AGG:0.03,GGT:0.33,GGC:0.39,GGA:0.12,GGG:0.16,TAA:0.59,TAG:0.08,TGA:0.33},
pichia:{TTT:0.54,TTC:0.46,TTA:0.16,TTG:0.33,CTT:0.16,CTC:0.08,CTA:0.11,CTG:0.16,ATT:0.50,ATC:0.31,ATA:0.18,ATG:1.00,GTT:0.42,GTC:0.23,GTA:0.15,GTG:0.19,TCT:0.29,TCC:0.20,TCA:0.18,TCG:0.09,AGT:0.15,AGC:0.09,CCT:0.35,CCC:0.15,CCA:0.42,CCG:0.09,ACT:0.40,ACC:0.26,ACA:0.24,ACG:0.11,GCT:0.45,GCC:0.26,GCA:0.23,GCG:0.06,TAT:0.47,TAC:0.53,CAT:0.57,CAC:0.43,CAA:0.61,CAG:0.39,AAT:0.48,AAC:0.52,AAA:0.47,AAG:0.53,GAT:0.58,GAC:0.42,GAA:0.56,GAG:0.44,TGT:0.64,TGC:0.36,TGG:1.00,CGT:0.17,CGC:0.05,CGA:0.10,CGG:0.05,AGA:0.48,AGG:0.16,GGT:0.44,GGC:0.14,GGA:0.33,GGG:0.10,TAA:0.51,TAG:0.29,TGA:0.20}
}

let codons=[],orig=[],mut=[]

dnaInput.oninput=load

function load(){
let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")
codons=[];orig=[];mut=[]

for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){
codons.push(c)
orig.push(CODON_TO_AA[c]||"X")
}
}
render()
}

function render(){
viewer.innerHTML=""
let usage=CODON_USAGE[organism.value]

codons.forEach((c,i)=>{
let aa=CODON_TO_AA[c]||"X"
let f=usage[c]||0

let color="bg-white"
if(f<0.1) color="bg-red-200"
if(mut.some(m=>m.includes(i+1))) color="bg-yellow-200"

let d=document.createElement("div")
d.className=`box border cursor-pointer ${color}`

d.innerHTML=`<div>${i+1}</div><b>${aa}</b><div class="text-xs">${c}</div>`

d.addEventListener("click",(e)=>{
e.stopPropagation()
openDD(e,i,d)
})

viewer.appendChild(d)
})

outputDNA.value=codons.join("")
mutSummary.innerHTML=mut.map(x=>`<div class="bg-indigo-100 px-2 rounded text-xs">${x}</div>`).join("")
}

function openDD(e,i,box){
dropdown.innerHTML=""
dropdown.classList.remove("hidden","pointer-events-none")

let usage=CODON_USAGE[organism.value]

Object.entries(AA_INFO).forEach(([aa,o])=>{
let g=document.createElement("div")
g.innerHTML=`<div class="font-bold text-xs">${o.name} (${aa})</div>`

let sorted=[...o.codons].sort((a,b)=>(usage[b]||0)-(usage[a]||0))

sorted.forEach((c,idx)=>{
let row=document.createElement("div")
row.className="flex justify-between px-2 py-1 hover:bg-slate-100 cursor-pointer"
if(idx===0) row.classList.add("bg-green-100")

row.innerHTML=`<span>${c}</span><span>${(usage[c]||0).toFixed(2)}</span>`

row.onclick=()=>{
apply(i,c)
dropdown.classList.add("hidden","pointer-events-none")
}

g.appendChild(row)
})

dropdown.appendChild(g)
})

let r=box.getBoundingClientRect()
dropdown.style.left=r.left+"px"
dropdown.style.top=r.bottom+"px"
}

function apply(i,c){
let old=orig[i]
let nw=CODON_TO_AA[c]

if(old!==nw){
let m=`${old}${i+1}${nw}`
if(!mut.includes(m)) mut.push(m)
}

codons[i]=c
render()
}

function copyDNA(){
navigator.clipboard.writeText(outputDNA.value)
}

document.addEventListener("click",(e)=>{
if(!e.target.closest("#dropdown")){
dropdown.classList.add("hidden","pointer-events-none")
}
})

</script>

</body>
</html>
