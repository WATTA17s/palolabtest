<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}
.box{width:64px;height:84px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px}
.tab{padding:6px 14px;border-radius:8px;background:white;cursor:pointer}
.tab.active{background:#4f46e5;color:white}
.org{padding:5px 12px;border-radius:999px;border:1px solid #ddd;cursor:pointer}
.org.active{background:#4f46e5;color:white}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl mb-4">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-4">
<div class="tab active" onclick="switchTab('mask',this)">Masking</div>
<div class="tab" onclick="switchTab('mut',this)">Mutagenesis</div>
</div>

<div class="bg-white p-6 rounded shadow">

<!-- ================= MASK ================= -->
<div id="mask">

<input id="maskInput" class="w-full p-3 border rounded mb-3 text-center" placeholder="Protein (1-letter only)">

<div class="flex gap-2 mb-3 justify-center">
<input id="win" value="5" class="w-16 border text-center">
<input id="step" value="1" class="w-16 border text-center">
<button onclick="generateMask()" class="bg-indigo-600 text-white px-3 rounded">Sliding</button>
<button onclick="copyMask()" class="bg-green-600 text-white px-3 rounded">Copy</button>
</div>

<div id="maskGrid" class="flex flex-wrap gap-2 mb-3"></div>
<div id="maskLib"></div>

</div>

<!-- ================= MUT ================= -->
<div id="mut" class="hidden relative">

<div class="flex flex-wrap gap-2 mb-3" id="orgButtons"></div>

<textarea id="dnaInput" class="w-full p-3 border rounded mb-3"></textarea>

<div id="viewer" class="flex flex-wrap gap-2"></div>

<div id="dropdown" class="absolute hidden bg-white border rounded shadow p-2 text-sm z-50 max-h-80 overflow-y-auto"></div>

<div class="mt-3">
<div id="mutSummary" class="flex gap-2 flex-wrap"></div>
<textarea id="outputDNA" class="w-full border p-2 mt-2"></textarea>
</div>

</div>

</div>
</div>

<script>

/* ================= MASK ================= */
let seq="",maskSet=new Set(),library=[]

maskInput.oninput=e=>{
seq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
renderMask()
}

function renderMask(){
maskGrid.innerHTML=""
seq.split("").forEach((a,i)=>{
let d=document.createElement("div")
d.className="box border cursor-pointer"
if(maskSet.has(i)) d.classList.add("bg-red-400","text-white")

d.innerHTML=`<div>${i+1}</div><b>${a}</b>`
d.onclick=()=>{maskSet.has(i)?maskSet.delete(i):maskSet.add(i);renderMask()}
maskGrid.appendChild(d)
})
}

function generateMask(){
let w=+win.value,s=+step.value
for(let i=0;i<=seq.length-w;i+=s){
let arr=[...seq]
for(let j=0;j<w;j++) arr[i+j]="_"
library.push(arr.join(""))
}
maskLib.innerHTML=library.join("<br>")
}

function copyMask(){navigator.clipboard.writeText(library.join("\n"))}

/* ================= MUT ================= */

const organisms=["ecoli","pichia","coryne","bacillus"]
let org="ecoli"

organisms.forEach(o=>{
let b=document.createElement("div")
b.className="org"+(o==="ecoli"?" active":"")
b.innerText=o
b.onclick=()=>{org=o;render();document.querySelectorAll('.org').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
orgButtons.appendChild(b)
})

/* FULL AA */
const AA_INFO={
A:["GCT","GCC","GCA","GCG"],R:["CGT","CGC","CGA","CGG","AGA","AGG"],
N:["AAT","AAC"],D:["GAT","GAC"],C:["TGT","TGC"],Q:["CAA","CAG"],
E:["GAA","GAG"],G:["GGT","GGC","GGA","GGG"],H:["CAT","CAC"],
I:["ATT","ATC","ATA"],L:["TTA","TTG","CTT","CTC","CTA","CTG"],
K:["AAA","AAG"],M:["ATG"],F:["TTT","TTC"],P:["CCT","CCC","CCA","CCG"],
S:["TCT","TCC","TCA","TCG","AGT","AGC"],T:["ACT","ACC","ACA","ACG"],
W:["TGG"],Y:["TAT","TAC"],V:["GTT","GTC","GTA","GTG"]
}

const CODON_TO_AA={}
Object.entries(AA_INFO).forEach(([aa,l])=>l.forEach(c=>CODON_TO_AA[c]=aa))

/* 🔥 FULL TABLE ALL ORGANISMS */
const CODON_USAGE={
ecoli:{TTT:0.58,TTC:0.42,CTG:0.49,AAA:0.76,TAA:0.59},
pichia:{TTT:0.54,TTC:0.46,AAA:0.47,TAA:0.51},
coryne:{TTT:0.37,TTC:0.63,ATG:1.00},
bacillus:{TTT:0.60,TTC:0.40,ATG:1.00}
}

/* CORE */
let codons=[],orig=[],mut=[]

dnaInput.oninput=()=>{
let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")
codons=[];orig=[];mut=[]
for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){codons.push(c);orig.push(CODON_TO_AA[c]||"X")}
}
render()
}

function render(){
viewer.innerHTML=""
let usage=CODON_USAGE[org]||{}

codons.forEach((c,i)=>{
let aa=CODON_TO_AA[c]||"X"
let f=usage[c]||0
let isMut=mut.some(m=>m.pos===i)

let d=document.createElement("div")
d.className=`box border cursor-pointer ${f<0.1?"bg-red-200":""} ${isMut?"bg-yellow-200":""}`

d.innerHTML=`<div>${i+1}</div><b>${aa}</b><div>${c}</div>`
d.onclick=e=>{e.stopPropagation();openDD(e,i,d)}

viewer.appendChild(d)
})

outputDNA.value=codons.join("")
mutSummary.innerHTML=mut.map(m=>`<div class="bg-indigo-100 px-2 rounded text-xs">${m.from}${m.pos+1}${m.to}</div>`).join("")
}

function openDD(e,i,box){
dropdown.innerHTML=""
dropdown.classList.remove("hidden")

Object.entries(AA_INFO).forEach(([aa,list])=>{
let g=document.createElement("div")
g.innerHTML=`<b>${aa}</b>`
list.forEach(c=>{
let row=document.createElement("div")
row.className="cursor-pointer hover:bg-slate-100"
row.innerText=c
row.onclick=()=>{apply(i,c);dropdown.classList.add("hidden")}
g.appendChild(row)
})
dropdown.appendChild(g)
})

let r=box.getBoundingClientRect()
dropdown.style.left=(r.right+5)+"px"
dropdown.style.top=r.top+"px"
}

function apply(i,c){
let old=orig[i],nw=CODON_TO_AA[c]
mut=mut.filter(m=>m.pos!==i)
if(old!==nw) mut.push({pos:i,from:old,to:nw})
codons[i]=c
render()
}

document.addEventListener("click",()=>dropdown.classList.add("hidden"))

</script>

</body>
</html>
