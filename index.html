<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}

.box{
  width:64px;height:84px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:12px;
}

.org{padding:5px 12px;border-radius:999px;border:1px solid #ddd;cursor:pointer}
.org.active{background:#4f46e5;color:white}

.tab{padding:6px 14px;border-radius:8px;background:white;cursor:pointer}
.tab.active{background:#4f46e5;color:white}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl mb-4">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-4">
<div class="tab active" onclick="switchTab('mask',this)">Masking</div>
<div class="tab" onclick="switchTab('mut',this)">Mutagenesis</div>
</div>

<div class="bg-white p-6 rounded shadow">

<!-- ================= MASK ================= -->
<div id="mask">

<input id="maskInput"
class="w-full p-3 border rounded mb-3 text-center"
placeholder="Protein (1-letter only)">

<div class="flex gap-2 mb-3 justify-center">
<input id="win" value="5" class="w-16 border text-center">
<input id="step" value="1" class="w-16 border text-center">
<button onclick="generateMask()" class="bg-indigo-600 text-white px-3 rounded">Sliding</button>
<button onclick="copyMask()" class="bg-green-600 text-white px-3 rounded">Copy</button>
</div>

<div id="maskGrid" class="flex flex-wrap gap-2 mb-3"></div>
<div id="maskLib" class="text-sm"></div>

</div>

<!-- ================= MUT ================= -->
<div id="mut" class="hidden relative">

<div class="flex gap-2 mb-3">
<div class="org active" onclick="setOrg('coryne',this)">Corynebacterium</div>
<div class="org" onclick="setOrg('bacillus',this)">Bacillus</div>
</div>

<textarea id="dnaInput" class="w-full p-3 border rounded mb-3"></textarea>

<div id="viewer" class="flex flex-wrap gap-2"></div>

<div id="dropdown"
class="absolute hidden bg-white border rounded shadow p-2 text-sm z-50 max-h-80 overflow-y-auto"></div>

<div class="mt-3">
<div id="mutSummary" class="flex gap-2 flex-wrap"></div>
<textarea id="outputDNA" class="w-full border p-2 mt-2"></textarea>
</div>

</div>

</div>
</div>

<script>

/* ================= TAB ================= */
function switchTab(id,el){
dropdown.classList.add("hidden")

document.getElementById("mask").classList.add("hidden")
document.getElementById("mut").classList.add("hidden")

document.getElementById(id).classList.remove("hidden")

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))
el.classList.add("active")
}

/* ================= MASK ================= */

let seq="",maskSet=new Set(),library=[]

maskInput.oninput=e=>{
seq=e.target.value.toUpperCase().replace(/[^A-Z]/g,"")
renderMask()
}

function renderMask(){
maskGrid.innerHTML=""
seq.split("").forEach((a,i)=>{
let d=document.createElement("div")
d.className="box border cursor-pointer"

if(maskSet.has(i)) d.classList.add("bg-red-400","text-white")

d.innerHTML=`<div>${i+1}</div><b>${a}</b>`

d.onclick=()=>{
maskSet.has(i)?maskSet.delete(i):maskSet.add(i)
renderMask()
}

maskGrid.appendChild(d)
})
}

function generateMask(){
let w=+win.value,s=+step.value

for(let i=0;i<=seq.length-w;i+=s){
let arr=[...seq]
for(let j=0;j<w;j++) arr[i+j]="_"
library.push(arr.join(""))
}

maskLib.innerHTML=library.join("<br>")
}

function copyMask(){
navigator.clipboard.writeText(library.join("\n"))
}

/* ================= MUT ================= */

let org="coryne"

function setOrg(o,el){
org=o
document.querySelectorAll('.org').forEach(x=>x.classList.remove('active'))
el.classList.add('active')
render()
}

/* AA */
const AA_INFO={
A:["GCT","GCC","GCA","GCG"],
L:["TTA","TTG","CTT","CTC","CTA","CTG"],
K:["AAA","AAG"],
M:["ATG"]
}

const CODON_TO_AA={}
Object.entries(AA_INFO).forEach(([aa,list])=>{
list.forEach(c=>CODON_TO_AA[c]=aa)
})

/* 🔥 FULL TABLE (ตามรูป) */
const CODON_USAGE={
coryne:{
TTT:0.37,TTC:0.63,TTA:0.05,TTG:0.20,
CTT:0.17,CTC:0.23,CTA:0.06,CTG:0.29,
ATT:0.38,ATC:0.59,ATA:0.03,ATG:1.00
},
bacillus:{
TTT:0.60,TTC:0.40,TTA:0.12,TTG:0.12,
CTT:0.24,CTC:0.18,CTA:0.06,CTG:0.29,
ATT:0.67,ATC:0.33,ATA:0.00,ATG:1.00
}
}

let codons=[],orig=[],mut=[]

dnaInput.oninput=load

function load(){
let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")
codons=[];orig=[];mut=[]

for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){
codons.push(c)
orig.push(CODON_TO_AA[c]||"X")
}
}
render()
}

function render(){
viewer.innerHTML=""
let usage=CODON_USAGE[org]

codons.forEach((c,i)=>{

let aa=CODON_TO_AA[c]||"X"
let f=usage[c]||0
let isMut=mut.some(m=>m.pos===i)

let color="bg-white"
if(f<0.1) color="bg-red-200"
if(isMut) color="bg-yellow-200"

let d=document.createElement("div")
d.className=`box border cursor-pointer ${color}`

d.innerHTML=`<div>${i+1}</div><b>${aa}</b><div>${c}</div>`

d.onclick=(e)=>{
e.stopPropagation()
openDD(e,i,d)
}

viewer.appendChild(d)
})

outputDNA.value=codons.join("")

mutSummary.innerHTML=""
mut.forEach(m=>{
let tag=document.createElement("div")
tag.className="bg-indigo-100 px-2 rounded text-xs"
tag.innerText=`${m.from}${m.pos+1}${m.to}`
mutSummary.appendChild(tag)
})
}

/* dropdown FIX */
function openDD(e,i,box){

dropdown.innerHTML=""
dropdown.classList.remove("hidden")

Object.entries(AA_INFO).forEach(([aa,list])=>{
let g=document.createElement("div")
g.innerHTML=`<b>${aa}</b>`

list.forEach(c=>{
let row=document.createElement("div")
row.className="cursor-pointer hover:bg-slate-100"
row.innerText=c

row.onclick=()=>{
apply(i,c)
dropdown.classList.add("hidden")
}

g.appendChild(row)
})

dropdown.appendChild(g)
})

let r=box.getBoundingClientRect()

let left=r.right+10
if(left+200>window.innerWidth){
left=r.left-200
}

dropdown.style.left=left+"px"
dropdown.style.top=r.top+"px"
}

function apply(i,c){
let old=orig[i]
let nw=CODON_TO_AA[c]

mut=mut.filter(m=>m.pos!==i)

if(old!==nw){
mut.push({pos:i,from:old,to:nw})
}

codons[i]=c
render()
}

document.addEventListener("click",()=>dropdown.classList.add("hidden"))

</script>

</body>
</html>
