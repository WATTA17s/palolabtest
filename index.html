<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pa1oLAB</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}

.nav-btn{
  padding:8px 14px;
  border-radius:10px;
  background:white;
  cursor:pointer;
}
.nav-btn.active{
  background:#4f46e5;
  color:white;
}

.box{
  width:64px;
  height:78px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-radius:10px;
}
</style>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-6xl mx-auto">
<h1 class="text-3xl font-semibold mb-6">🧬 Pa1oLAB</h1>

<div class="flex gap-2 mb-6">
<button class="nav-btn active" onclick="switchPage(event,'align')">Alignment</button>
<button class="nav-btn" onclick="switchPage(event,'mask')">Masking</button>
<button class="nav-btn" onclick="switchPage(event,'mut')">Mutagenesis</button>
</div>

<div class="bg-white p-6 rounded-xl shadow">

<!-- ALIGN -->
<div id="align">
<textarea id="alignInput" class="w-full p-3 border rounded font-mono mb-4"></textarea>
<button onclick="runAlign()" class="bg-indigo-600 text-white px-4 py-2 rounded">Align</button>
<div id="alignOut" class="mt-4 font-mono text-sm"></div>
</div>

<!-- MASK -->
<div id="mask" class="hidden">

<input id="maskInput" class="w-full p-3 border rounded font-mono mb-4 text-center">

<div class="flex justify-center gap-3 mb-3">
<span>Sliding</span>
<div id="toggle" class="w-10 h-5 bg-slate-300 rounded-full cursor-pointer relative transition">
<div id="dot" class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 transition"></div>
</div>
</div>

<div class="flex justify-center gap-2 mb-4">
<input id="win" type="number" value="5" class="w-16 border text-center rounded">
<input id="step" type="number" value="1" class="w-16 border text-center rounded">
<button id="genBtn" class="bg-indigo-600 text-white px-4 rounded">Generate</button>
</div>

<div id="grid" class="flex flex-wrap gap-2 justify-center mb-4"></div>

</div>

<!-- MUT -->
<div id="mut" class="hidden relative">

<select id="organism" class="border p-2 rounded mb-3">
<option value="ecoli">E. coli</option>
</select>

<textarea id="dnaInput" class="w-full p-3 border rounded font-mono mb-3"></textarea>

<button onclick="loadDNA()" class="bg-indigo-600 text-white px-4 py-2 rounded">Load</button>

<div id="viewer" class="mt-4 flex flex-wrap gap-3 justify-center"></div>

<div id="dropdown" class="absolute hidden bg-white border rounded shadow p-2 text-sm z-[9999]"></div>

<div id="mutSummary" class="mt-4 text-sm"></div>

<textarea id="outputDNA" class="w-full p-3 border rounded font-mono mt-3"></textarea>

<button onclick="copyDNA()" class="mt-2 bg-green-600 text-white px-3 py-1 rounded">Copy DNA</button>

</div>

</div>
</div>

<script>

/* NAV */
function switchPage(e,id){
document.querySelectorAll("#align,#mask,#mut").forEach(x=>x.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")
document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")
}

/* ================= MASK ================= */
const AA_SET=new Set(["A","R","N","D","C","Q","E","G","H","I","L","K","M","F","P","S","T","W","Y","V"])

let state={sequence:"",manualMask:new Set(),sliding:false}

maskInput.oninput=e=>{
let raw=e.target.value.toUpperCase()
let f=""
for(let c of raw){if(AA_SET.has(c))f+=c}
e.target.value=f
state.sequence=f
renderMask()
}

toggle.onclick=()=>{
state.sliding=!state.sliding
if(state.sliding){
toggle.classList.remove("bg-slate-300")
toggle.classList.add("bg-indigo-600")
dot.style.transform="translateX(20px)"
}else{
toggle.classList.remove("bg-indigo-600")
toggle.classList.add("bg-slate-300")
dot.style.transform="translateX(0px)"
}
}

function renderMask(){
grid.innerHTML=""
state.sequence.split("").forEach((aa,i)=>{
let d=document.createElement("div")
d.className="box border cursor-pointer"
d.innerHTML=`<div class="text-xs">${i+1}</div><b>${aa}</b>`
grid.appendChild(d)
})
}

/* ================= MUT ================= */

/* FULL CODON TABLE */
const CODON_TABLE_FULL={
F:["TTT","TTC"],L:["TTA","TTG","CTT","CTC","CTA","CTG"],
I:["ATT","ATC","ATA"],M:["ATG"],
V:["GTT","GTC","GTA","GTG"],
S:["TCT","TCC","TCA","TCG","AGT","AGC"],
P:["CCT","CCC","CCA","CCG"],
T:["ACT","ACC","ACA","ACG"],
A:["GCT","GCC","GCA","GCG"],
Y:["TAT","TAC"],H:["CAT","CAC"],
Q:["CAA","CAG"],N:["AAT","AAC"],
K:["AAA","AAG"],D:["GAT","GAC"],
E:["GAA","GAG"],C:["TGT","TGC"],
W:["TGG"],R:["CGT","CGC","CGA","CGG","AGA","AGG"],
G:["GGT","GGC","GGA","GGG"]
}

/* FULL USAGE */
const CODON_USAGE={ ecoli:{ TTT:0.58,TTC:0.42,TTA:0.13,TTG:0.13,CTT:0.11,CTC:0.10,CTA:0.04,CTG:0.49,
ATT:0.50,ATC:0.40,ATA:0.09,ATG:1.00,GTT:0.26,GTC:0.21,GTA:0.16,GTG:0.37,
TCT:0.14,TCC:0.15,TCA:0.14,TCG:0.15,AGT:0.16,AGC:0.27,
CCT:0.17,CCC:0.13,CCA:0.19,CCG:0.51,
ACT:0.17,ACC:0.41,ACA:0.15,ACG:0.27,
GCT:0.16,GCC:0.27,GCA:0.22,GCG:0.35,
TAT:0.57,TAC:0.43,CAT:0.58,CAC:0.42,CAA:0.33,CAG:0.67,
AAT:0.47,AAC:0.53,AAA:0.76,AAG:0.24,
GAT:0.63,GAC:0.37,GAA:0.68,GAG:0.32,
TGT:0.45,TGC:0.55,TGG:1.00,
CGT:0.36,CGC:0.37,CGA:0.07,CGG:0.11,AGA:0.05,AGG:0.03,
GGT:0.33,GGC:0.39,GGA:0.12,GGG:0.16,
TAA:0.59,TAG:0.08,TGA:0.33 } }

const CODON_TO_AA={}
for(let aa in CODON_TABLE_FULL){
CODON_TABLE_FULL[aa].forEach(c=>CODON_TO_AA[c]=aa)
}

let codons=[],originalAA=[],mutations=[]

function loadDNA(){
let dna=dnaInput.value.toUpperCase().replace(/[^ATGC]/g,"")
codons=[];originalAA=[];mutations=[]
for(let i=0;i<dna.length;i+=3){
let c=dna.slice(i,i+3)
if(c.length===3){
codons.push(c)
originalAA.push(CODON_TO_AA[c]||"X")
}
}
renderMut()
}

function renderMut(){
viewer.innerHTML=""
codons.forEach((c,i)=>{
let aa=CODON_TO_AA[c]||"X"

let d=document.createElement("div")
d.className="box border bg-white hover:bg-slate-100 cursor-pointer"

d.innerHTML=`
<div class="text-[10px] text-slate-500">${i+1}</div>
<div class="text-lg font-bold">${aa}</div>
<div class="text-[10px] font-mono text-slate-600">${c}</div>
`

d.onclick=(e)=>{
e.stopPropagation()
openDropdown(e,i)
}

viewer.appendChild(d)
})
updateOutput()
}

function openDropdown(e,i){
let aa=CODON_TO_AA[codons[i]]
let list=CODON_TABLE_FULL[aa]||[]
let usage=CODON_USAGE.ecoli

list.sort((a,b)=>(usage[b]||0)-(usage[a]||0))

dropdown.innerHTML=""

list.forEach((c,idx)=>{
let freq=usage[c]||0

let row=document.createElement("div")
row.className="flex justify-between p-1 hover:bg-slate-200 cursor-pointer"

row.innerHTML=`
<span>${c}</span>
<span class="text-xs ${idx==0?'text-green-600 font-bold':''}">
${freq.toFixed(2)} ${idx==0?'⭐':''}
</span>
`

row.onclick=()=>{
applyMutation(i,c)
dropdown.classList.add("hidden")
}

dropdown.appendChild(row)
})

dropdown.style.left=e.pageX+"px"
dropdown.style.top=e.pageY+"px"
dropdown.classList.remove("hidden")
}

function applyMutation(i,newCodon){
let oldAA=originalAA[i]
let newAA=CODON_TO_AA[newCodon]
if(oldAA!==newAA){
let mut=`${oldAA}${i+1}${newAA}`
if(!mutations.includes(mut))mutations.push(mut)
}
codons[i]=newCodon
renderMut()
}

document.addEventListener("click",(e)=>{
if(!e.target.closest("#dropdown") && !e.target.closest("#viewer")){
dropdown.classList.add("hidden")
}
})

function updateOutput(){
outputDNA.value=codons.join("")
mutSummary.innerText=mutations.join(" ")
}

function copyDNA(){
navigator.clipboard.writeText(outputDNA.value)
}

</script>

</body>
</html>
